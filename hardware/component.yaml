schema_version: 1
name: hardware
path: hardware
kind: script-directory
visibility: internal
summary: Provide Raspberry Pi setup, probe, smoke-test scripts, Pi-side authoritative runtime supervision units, transport-only peer camera proxy services for still and live IMX500 paths, the operator-facing Pi deploy command that replaces the old manual mirror rollout step, and the self-coding Codex bootstrap entrypoint for Twinr.
owned_concerns:
  - Persist Raspberry Pi hardware settings into Twinr env files and OS configuration
  - Install vendor or system dependencies needed for the display, audio, and printer paths
  - Stage Pi-side productive systemd units for authoritative runtime supervision and the web portal
  - Stage the transport-only peer camera proxy service on the dedicated AI-camera helper Pi
  - Stage the transport-only peer AI-camera observation proxy service on the dedicated AI-camera helper Pi
  - Deploy the authoritative leading-repo code plus productive runtime settings onto the Pi acceptance checkout and restart the productive services there
  - Retire standalone break-glass units out of the tracked hardware tree once they are no longer part of product operation
  - Bootstrap the Pi-side self-coding Codex bridge, CLI, and auth prerequisites from the leading repo
  - Run bounded manual probes for buttons, Pi AI Camera, PIR motion, display, and printer setup
out_of_scope:
  - Runtime device adapters in src/twinr/hardware and src/twinr/display
  - Twinr loop orchestration and product behavior policy
  - Ad-hoc runtime patches directly in /twinr without leading-repo changes
files:
  - path: buttons/setup_buttons.sh
    role: Persist button GPIO settings and optionally run the configured button probe
  - path: buttons/probe_buttons.py
    role: Print live button events for configured or ad-hoc GPIO lines
  - path: display/setup_display.sh
    role: Configure the active HDMI or Waveshare display backend and persist its env wiring
  - path: display/display_test.py
    role: Render a one-shot display test card
  - path: display/run_display_loop.py
    role: Run the standalone status display loop for manual validation
  - path: display/run_visual_qc.py
    role: Capture the visible HDMI scene set, diff it, and persist report-backed QC artifacts
  - path: mic/setup_audio.sh
    role: Configure ALSA or PipeWire defaults and optional proactive-audio env keys
  - path: mic/setup_respeaker_access.sh
    role: Install the XVF3800 udev rule so the runtime user can read libusb host-control without sudo
  - path: servo/setup_pololu_maestro.sh
    role: Install the official Pololu USB rule and switch one Maestro into USB_DUAL_PORT for Twinr's command-port runtime path
  - path: ops/bootstrap_self_coding_pi.py
    role: Reproducibly sync the pinned self-coding Codex bridge/auth to the Pi and run the remote readiness self-test
  - path: ops/deploy_pi_runtime.py
    role: Mirror the leading repo to the Pi, sync the authoritative runtime env, reinstall Twinr, restart productive units, and verify post-restart health
  - path: ops/install_whatsapp_node_runtime.py
    role: Download, verify, and stage the pinned local Node.js runtime under state/tools for the WhatsApp Baileys worker
  - path: ops/peer_ai_camera_observation_proxy.py
    role: Serve bounded live IMX500 observation payloads from the dedicated AI-camera proxy Pi over the direct Ethernet link
  - path: ops/peer_camera_snapshot_proxy.py
    role: Serve bounded still PNG snapshots from the dedicated AI-camera proxy Pi over the direct Ethernet link
  - path: ops/twinr-peer-ai-camera-proxy.service
    role: Keep the peer AI-camera observation proxy bound to the direct-link address on the helper Pi
  - path: ops/twinr-peer-camera-proxy.service
    role: Keep the peer camera snapshot proxy bound to the direct-link address on the helper Pi
  - path: ops/twinr-runtime-supervisor.service
    role: Authoritatively supervise the productive streaming loop plus remote watchdog on the Pi
  - path: piaicam/fetch_mediapipe_models.py
    role: Download the official MediaPipe pose, hand-landmarker, and gesture task bundles needed by the Pi runtime path
  - path: piaicam/capture_custom_gesture_dataset.py
    role: Capture bounded labeled still-image datasets for custom MediaPipe gesture training
  - path: piaicam/custom_gesture_workflow.py
    role: Share dataset validation, capture planning, and runtime-model copy helpers for custom gesture workflows
  - path: piaicam/smoke_piaicam.py
    role: Run bounded Pi AI Camera enumerate/still/video/IMX500 smoke phases
  - path: piaicam/train_custom_gesture_model.py
    role: Train and export a custom MediaPipe Gesture Recognizer task bundle on the leading repo
  - path: pir/setup_pir.sh
    role: Persist PIR GPIO settings and optionally run the motion probe
  - path: pir/probe_pir.py
    role: Print live PIR state and motion events
  - path: printer/setup_printer.sh
    role: Create the raw thermal-printer CUPS queue and optional smoke test
related_runtime_packages:
  - path: src/twinr/hardware
  - path: src/twinr/display
manual_checks:
  - command: bash -n hardware/buttons/setup_buttons.sh hardware/display/setup_display.sh hardware/mic/setup_audio.sh hardware/mic/setup_respeaker_access.sh hardware/servo/setup_pololu_maestro.sh hardware/pir/setup_pir.sh hardware/printer/setup_printer.sh
  - command: PYTHONPATH=src python3 -m py_compile hardware/buttons/probe_buttons.py hardware/display/display_test.py hardware/display/run_display_loop.py hardware/display/run_visual_qc.py hardware/ops/bootstrap_self_coding_pi.py hardware/ops/check_pi_openai_env_contract.py hardware/ops/deploy_pi_runtime.py hardware/ops/install_whatsapp_node_runtime.py hardware/ops/peer_ai_camera_observation_proxy.py hardware/ops/peer_camera_snapshot_proxy.py hardware/piaicam/custom_gesture_workflow.py hardware/piaicam/capture_custom_gesture_dataset.py hardware/piaicam/fetch_mediapipe_models.py hardware/piaicam/smoke_piaicam.py hardware/piaicam/train_custom_gesture_model.py hardware/pir/probe_pir.py
