project:
  name: Twinr
  tagline: Minimal digital, maximal haptic physical AI agent
  language: English
  audience:
    primary:
      - senior citizens
    secondary:
      - caregivers
      - family members
      - operators
  principles:
    - minimal digital complexity
    - maximum haptic clarity
    - senior-friendly interaction
    - low cognitive load
    - local configurability

interaction:
  green_button:
    purpose: Start voice capture
    behavior:
      - start_listening
      - capture_until_short_speech_pause
      - handoff_audio_to_stt
  yellow_button:
    purpose: Print last answer
    behavior:
      - fetch_last_assistant_answer
      - summarize_with_meta_llm_for_print
      - send_to_thermal_printer

conversation_pipeline:
  steps:
    - hardware_button_event
    - microphone_capture
    - speech_pause_detection
    - stt_provider_transcription
    - foundation_model_reasoning
    - agentic_workflow_execution
    - response_generation
    - tts_provider_playback

status_display:
  type: eyes_display
  states:
    waiting:
      description: Idle and ready
    listening:
      description: Capturing user speech
    processing:
      description: Thinking or running workflows
    answering:
      description: Speaking response
    printing:
      description: Printing condensed answer
    error:
      description: Fault or recoverable issue

hardware:
  buttons:
    integration_mode: gpio
    gpio_chip: gpiochip0
    setup_script: hardware/buttons/setup_buttons.sh
    notes:
      - buttons are not exposed as Linux input devices on the current Raspberry Pi setup
      - GPIO lines should be discovered with hardware/buttons/probe_buttons.py
    green:
      role: listen_trigger
    yellow:
      role: print_trigger
  microphone:
    role: voice_input
    setup_script: hardware/mic/setup_audio.sh
    default_device: default
    stop_condition: short_speech_pause
  speaker:
    role: audio_output
    setup_script: hardware/mic/setup_audio.sh
    default_device: default
  thermal_printer:
    role: short_answer_printout
    model: DFRobot DFR0503-EN
    usb_compat: Gprinter GP-58
    cups_queue: Thermal_GP58
    setup_script: hardware/printer/setup_printer.sh
  display:
    role: status_feedback_with_eyes
    model: Waveshare 4.2inch e-Paper Module Rev 2.2
    driver: waveshare_4in2_v2
    setup_script: hardware/display/setup_display.sh
    test_script: hardware/display/display_test.py
    interface: spi
    pins:
      mosi: 10
      clk: 11
      cs: 8
      dc: 25
      reset: 17
      busy: 24

providers:
  stt:
    role: speech_to_text
    candidates:
      - OpenAI
      - DeepInfra
      - OpenRouter
      - other pluggable providers
    default_openai_model: whisper-1
  llm:
    role: reasoning_and_agent_control
    candidates:
      - OpenAI
      - DeepInfra
      - OpenRouter
    default_openai_model: gpt-5.4-mini
    default_openai_reasoning_effort: medium
    web_search_capable: true
  tts:
    role: spoken_response_generation
    candidates:
      - OpenAI
      - DeepInfra
      - OpenRouter
    default_openai_model: gpt-4o-mini-tts
    default_openai_voice: marin
    default_speed: 1.0
    default_style: clear_natural_standard_german
  realtime_voice:
    role: low_latency_direct_audio_conversation
    provider: OpenAI
    default_openai_model: gpt-4o-realtime-preview
    default_openai_voice: sage
    default_speed: 1.0
    input_audio_format: pcm16_24khz_mono
    output_audio_format: pcm16_24khz_mono
    web_search_capable: true
    reminder_tool_capable: true
    follow_up_listening: true
    audible_listen_beep: true
  meta_llm:
    role: compress_last_answer_for_print
    output_requirements:
      - concise
      - easy_to_read
      - print_friendly
      - senior_readable

agent:
  base_agent:
    responsibilities:
      - run_button_driven_audio_loop
      - coordinate_stt_llm_tts
      - maintain_short_term_context
      - manage_state_machine
      - expose_last_answer_for_print
  workflows:
    responsibilities:
      - tool_enabled_tasks
      - multi_step_execution
      - provider_calls
      - external_actions_when_enabled

memory:
  on_device:
    default: true
    purpose:
      - retain_recent_conversations
      - compact_history_when_needed
    structure:
      - raw_tail
      - ledger
      - search_results
      - state
    guarantees:
      - search_tool_results_persist_as_typed_entries
      - compacted_context_stays_replayable
      - runtime_snapshot_restores_structured_memory
      - listening_timing_adapts_slowly_within_bounds
    persistence:
      runtime_snapshot_path: state/runtime-state.json
      durable_memory_markdown_path: state/MEMORY.md
      reminder_store_path: state/reminders.json
      automation_store_path: state/automations.json
      adaptive_timing_store_path: state/adaptive_timing.json
      automation_poll_interval_s: 5.0
      durable_memory_write_rule: explicit_user_request_only
      reminder_write_rule: explicit_user_request_only_via_tool
      managed_profile_updates:
        - personality/USER.md
        - personality/PERSONALITY.md
    operator_surfaces:
      - memory_page_lists_pending_and_delivered_reminders
      - memory_page_can_add_complete_and_delete_reminders
      - settings_page_shows_adaptive_timing_profile_and_reset
  print_memory:
    purpose:
      - store_last_response
      - support_meta_llm_reformatting
      - enable_reprint_or_print_history_extensions
  long_term:
    optional: true
    backend: ChonkyDB
    capabilities:
      - vector_index
      - graph_index
      - fulltext_index
      - hash_lookup
      - temporal_index
    purpose:
      - durable_user_preferences
      - persistent_facts
      - long_horizon_recall
    runtime_orchestration:
      package: src/twinr/memory/longterm
      behavior:
        - build_small_provider_context_before_turns
        - persist_episodic_turns_in_background
        - keep_internal_semantic_memory_in_canonical_english
    current_client_basics:
      - instance_overview
      - auth_overview
      - record_listing
      - single_record_fetch
      - full_document_fetch
      - unified_retrieval
      - single_record_submission
      - bulk_record_submission
      - graph_edges
      - graph_neighbors
      - graph_path
      - graph_patterns
      - versioned_twinr_graph_schema_v1
      - long_term_service_orchestration
      - bounded_async_write_queue
      - recent_episodic_context_rendering
    graph_schema:
      name: twinr_graph
      version: 1
      edge_namespaces:
        - social
        - general
        - temporal
        - spatial
        - user
    config_env:
      - TWINR_LONG_TERM_MEMORY_ENABLED
      - TWINR_LONG_TERM_MEMORY_BACKEND
      - TWINR_LONG_TERM_MEMORY_PATH
      - TWINR_LONG_TERM_MEMORY_BACKGROUND_STORE_TURNS
      - TWINR_LONG_TERM_MEMORY_WRITE_QUEUE_SIZE
      - TWINR_LONG_TERM_MEMORY_RECALL_LIMIT
      - TWINR_CHONKYDB_BASE_URL
      - TWINR_CHONKYDB_API_KEY
      - TWINR_CHONKYDB_API_KEY_HEADER
      - TWINR_CHONKYDB_ALLOW_BEARER_AUTH
      - TWINR_CHONKYDB_TIMEOUT_S

web_interface:
  port: 1337
  host: 0.0.0.0
  implementation: server_rendered_fastapi
  goals:
    - simple_local_configuration
    - operator_friendly_controls
    - low_technical_barrier
  configurable_items:
    - dashboard_overview
    - personality
    - user_preferences
    - automations
    - provider_selection
    - device_settings
    - memory_settings
    - print_settings
    - display_settings
  pages:
    - dashboard
    - personality
    - memory
    - automations
    - connect
    - settings
    - user
  memory_page_features:
    - live_runtime_snapshot
    - durable_memory_markdown_inspection
    - durable_memory_manual_add
    - reminder_inspection
    - reminder_manual_add
    - reminder_complete_delete_controls
  automations_page_features:
    - family_grouped_overview
    - scheduled_automation_create_edit_delete
    - sensor_automation_create_edit_delete
    - enable_disable_controls
    - integration_registered_family_blocks
  personality_page_features:
    - edit_system_base_text
    - edit_personality_base_text
    - inspect_managed_personality_updates
    - manual_managed_personality_upsert
  user_page_features:
    - edit_user_base_text
    - inspect_managed_user_updates
    - manual_managed_user_upsert
  live_runtime_snapshot: true

non_functional_requirements:
  usability:
    - obvious_physical_controls
    - low_cognitive_load
    - short_feedback_loops
  resilience:
    - clear_error_state
    - recoverable_failures
    - provider_abstraction
  privacy:
    - on_device_memory_available_by_default
    - long_term_memory_optional
  deployment:
    - runs_on_raspberry_pi
    - supports_local_web_configuration

repository_layout:
  docs: Documentation and structured specs
  docs/providers: Provider-specific notes and setup guides
  hardware/buttons: Button handling and GPIO probing
  hardware/display: Display setup and smoke tests
  hardware/mic: Microphone integrations
  hardware/printer: Thermal printer integrations
  personality: System, user, and personality context files
  state: Runtime-generated persistent snapshot and durable remembered facts
  src/twinr/agent: Python package for agent orchestration
  src/twinr/display: Python package for Waveshare display adapters
  src/twinr/providers: Python package for provider adapters
  src/twinr/providers/openai: OpenAI provider implementation
  src/twinr/memory: Python package for on-device memory, durable memory, and reminders
  src/twinr/memory/chonkydb: External ChonkyDB client basics and versioned Twinr graph schema for future long-term memory use
  src/twinr/memory/longterm: Long-term memory orchestration for retrieval and non-blocking episodic persistence
  src/twinr/memory/on_device: Rolling local conversation memory
  src/twinr/automations: Python package for local automation triggers, actions, evaluation, and CRUD storage
  src/twinr/hardware: Python package for hardware adapters
  src/twinr/web: Server-rendered local control dashboard
  src/twinr/web/automations.py: Automation web view models, family registry, and form parsing
  src/twinr/integrations/web_automation_families.py: Integration-side automation family registry for the local dashboard
  test: Tests and validation

automation_tools:
  realtime_voice_tools:
    - list_automations
    - create_time_automation
    - create_sensor_automation
    - update_time_automation
    - update_sensor_automation
    - delete_automation
  current_scope:
    - time_based_automation_management
    - sensor_triggered_automation_management
    - daily_weekly_once_schedules
    - pir_motion_detected
    - pir_no_motion_with_hold
    - vad_speech_detected
    - vad_quiet_with_hold
    - camera_person_visible
    - camera_hand_or_object_near_camera
    - spoken_static_actions
    - printed_static_actions
    - llm_prompt_actions
    - optional_web_search_during_due_execution

simple_runtime_settings:
  realtime_voice_tool: update_simple_setting
  supported_settings:
    - memory_capacity
    - spoken_voice
    - speech_speed
    - speech_pause_ms
    - follow_up_timeout_s
  bounded_voice_options:
    - marin
    - cedar
    - sage
    - alloy
    - coral
    - echo
  descriptive_voice_mapping:
    enabled: true
    example_requests:
      - male_voice
      - female_voice
      - neutral_voice
      - warmer_voice
      - softer_voice
      - deeper_voice
  speech_speed_range:
    minimum: 0.75
    maximum: 1.15
  operator_examples:
    - every_day_at_noon_tell_me_the_news_about_topic_x
    - every_morning_give_me_the_weather
    - every_day_at_08_00_print_the_headlines

adaptive_timing:
  enabled_by_default: true
  learning_signals:
    - no_speech_timeout
    - speech_started_after_ms
    - resumed_after_pause_count
  parameters:
    - button_start_timeout_s
    - follow_up_start_timeout_s
    - speech_pause_ms
    - pause_grace_ms
  rules:
    - widen_faster_than_it_shrinks
    - keep_hard_bounds
    - stay_anchored_to_configured_base_values

mvp:
  includes:
    - gpio_button_discovery
    - green_button_listen_flow
    - pause_based_stop_listening
    - stt_to_llm_to_tts_roundtrip
    - realtime_audio_roundtrip
    - yellow_button_print_last_answer
    - eye_status_display
    - on_device_short_term_memory
    - local_web_ui_on_1337
  excludes:
    - complex_multi_user_management
    - cloud_only_configuration
    - mandatory_long_term_memory
