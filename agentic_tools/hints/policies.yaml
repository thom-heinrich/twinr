hints_version: "1.0"
policy_revision: "2026-02-06"
limits:
  max_hints: 6
  max_commands_per_hint: 3

category_rules:
  - category: governance
    keywords:
      - "finding"
      - "fixreport"
      - "resolved"
      - "link token"
      - "links"
      - "status"
  - category: safety
    keywords:
      - "checkreview"
      - "rollback"
      - "verify"
      - "pytest"
      - "lint"
      - "guardrail"
  - category: workflow
    keywords:
      - "overview"
      - "explain"
      - "next"
      - "task"
      - "workflow"

priority_rules:
  - priority: 95
    keywords:
      - "status\":\"resolved"
      - "status=resolved"
      - "close"
      - "closure"
  - priority: 90
    keywords:
      - "fixreport"
      - "finding"
  - priority: 85
    keywords:
      - "checkreview"
      - "rollback"
      - "verify"
      - "pytest"
      - "lint"
  - priority: 70
    keywords:
      - "overview"
      - "explain"
      - "search"
  - priority: 55
    keywords:
      - "log"
      - "note"

conflict_rules:
  - id: finding_status_resolved_vs_open
    left_keywords:
      - "status\":\"resolved"
      - "status=resolved"
    right_keywords:
      - "status\":\"open"
      - "status=open"
  - id: hypothesis_supported_vs_refuted
    left_keywords:
      - "--status supported"
      - "status=supported"
    right_keywords:
      - "--status refuted"
      - "status=refuted"
  - id: duplicate_fixreport_guidance
    left_keywords:
      - "fixreport create"
      - "--link finding:"
    right_keywords:
      - "no fixreport link"
      - "missing link"

global_guardrails:
  - "Verify linked IDs/paths exist before mutating stores."
  - "Use smallest safe scope; avoid broad edits without evidence."
  - "After risky updates, verify outcome and note rollback path."

link_kind_tool_map:
  task: tasks
  finding: findings
  fixreport: fixreport
  hypothesis: hypothesis
  script: scripthistory
  code_review: checkreview
  rule: rules
  ssot: ssot
