# Failure-modes catalog for FixReport.
# Source: /home/thh/tessairact/.codex/skills/failure_modes/SKILL.md
#
# Purpose:
# - Make recurring failure-mode checks explicit on every bugfix (FixReport).
# - Provide a shared, consistent vocabulary for "what did we verify / prevent?".
#
# Notes:
# - Status values are tokens (avoid YAML booleans): pass|fail|unknown|na
# - This is a "recurring failures" catalog: prefer fewer, higher-leverage checks.
#   Add items only if they recur across multiple incidents or repeatedly poison KPIs/PNL.

catalog_version: 1

status_vocab:
  allowed: [pass, fail, unknown, na]
  meaning:
    pass: "Checked and OK for this fix."
    fail: "Checked and FAILED; needs follow-up."
    unknown: "Not checked / unclear."
    na: "Not applicable for this fix."

# Optional grouping for humans/agents (ignored by the validator/loader).
groups:
  time_semantics:
    title: "Time semantics / causality"
    checks:
      - FM_HORIZON_DECLARED
      - FM_TIME_SEMANTICS_EVENT_VS_INGEST
      - FM_HORIZON_SLIP_DISTRIBUTION_OK
      - FM_ASOF_JOINS_ENFORCED
      - FM_BUCKET_ROUNDING_HAZARDS
      - FM_WITHIN_BUCKET_ARGMAX_LOOKAHEAD_GUARDED
      - FM_LATE_EVENTS_NO_FORWARD_DATE
      - FM_BACKFILL_CLOCK_CONSISTENCY
      - FM_END_CAP_TO_TRUTH_AVAILABILITY
  contracts_schema:
    title: "Contracts / schema / framing"
    checks:
      - FM_SCHEMA_CONTRACT_DRIFT_GUARDED
      - FM_TOPIC_FRAMING_DRIFT_GUARDED
      - FM_DEFAULT_ZERO_DOMINANCE
      - FM_NO_HASATTR_FIELD_GUARDS
      - FM_PRODUCER_OVERLAP_GUARDED
      - FM_DEDUPE_POST_RESTART_SAFE
  cost_semantics:
    title: "Cost semantics"
    checks:
      - FM_COST_SEMANTICS_DECLARED
      - FM_COST_DOUBLE_COUNT_CHECK
      - FM_COST_TARGET_MATCH_DECLARED
      - FM_COST_TRUTH_HORIZON_MATCH
      - FM_COST_TRUTH_FILL_NO_FUTURE
      - FM_DECISION_GATES_EX_ANTE
  evaluation_validity:
    title: "Evaluation validity"
    checks:
      - FM_HEARTBEATS_EXCLUDED
      - FM_EVAL_WINDOW_AVAILABILITY_INTERSECTION
      - FM_PURGED_CV_EMBARGO_ENFORCED
      - FM_LABEL_DEGENERACY_GATED
      - FM_OBJECTIVE_MISMATCH_EVAL_PROXY_GUARDED
  dq_microstructure:
    title: "Data quality / microstructure"
    checks:
      - FM_PRICE_MARK_SANITY_GUARDED
      - FM_L2_MICROSTRUCTURE_SANITY_GUARDED
      - FM_BBO_SPREAD_GLITCH_GUARDED
      - FM_QUANTITY_UNITS_NORMALIZED
      - FM_VENUE_INSTRUMENT_JOIN_KEYS_STRICT
  liveness_gating:
    title: "Liveness / gating / no-trade"
    checks:
      - FM_TTL_LAG_DROPS_MONITORED
      - FM_SEEK_TO_END_ON_ASSIGN_EXPLICIT
      - FM_KILL_SWITCH_GUARDED
      - FM_FAIL_CLOSED_MEANS_FLATTEN
  infra_deploy:
    title: "Infra / deploy integrity"
    checks:
      - FM_SYSTEMD_CONFIG_ATTESTATION
      - FM_CLICKHOUSE_MUTATION_BACKLOG_GUARDED
      - FM_ASYNC_INSERT_DEDUPE_SAFE
      - FM_KAFKA_DELIVERY_ERROR_COMMIT_RECOVERY

checks:
  FM_HORIZON_DECLARED:
    title: "Horizon declared (H)"
    description: "Horizon H is explicitly declared/recorded (and matches decision cadence)."

  FM_TIME_SEMANTICS_EVENT_VS_INGEST:
    title: "Time semantics: ts_event vs ts_ingest"
    description: "Event-time vs ingest-time semantics are correct; no time-travel leakage; lags computed on ts_ingest where appropriate."

  FM_HORIZON_SLIP_DISTRIBUTION_OK:
    title: "Horizon slip distribution is OK"
    description: "Validate slip_ms=(target_ts-decision_ts)-horizon_ms_declared has p50≈0 and bounded p95; fail if systematic offset/leakage."

  FM_ASOF_JOINS_ENFORCED:
    title: "As-of joins enforced (no future leakage)"
    description: "Features and truth joins are causally correct (<= base/decision ts); no argMax/joins that can select post-decision data."

  FM_BUCKET_ROUNDING_HAZARDS:
    title: "Bucket rounding hazards checked"
    description: "No floor/ceil mistakes that pull pre-entry bars or pre-decision samples into post-entry windows; exit_ts >= entry_ts always holds."

  FM_WITHIN_BUCKET_ARGMAX_LOOKAHEAD_GUARDED:
    title: "Within-bucket argMax lookahead guarded"
    description: "Grouped argMax over coarse buckets cannot select feature rows after base_ts; enforce max(feature_ts-base_ts) <= 0ms."

  FM_HEARTBEATS_EXCLUDED:
    title: "Heartbeats excluded from learning/eval"
    description: "Heartbeats are treated as liveness only; evaluators/learners skip heartbeat-only rows."

  FM_MISSINGNESS_PARITY_TRAIN_LIVE:
    title: "Missingness parity TRAIN ↔ LIVE"
    description: "Missingness semantics match train and live (NaN vs zero-fill vs sentinel); no silent mapping that changes model meaning."

  FM_LATE_EVENTS_NO_FORWARD_DATE:
    title: "Late/out-of-order events not forward-dated"
    description: "Late events are buffered (watermark) or dropped; never clamped into current bucket."

  FM_BACKFILL_CLOCK_CONSISTENCY:
    title: "Backfill/replay clock consistency"
    description: "Historical runs use end_utc as clock; do not use wall-clock now_utc inside historical evaluation."

  FM_END_CAP_TO_TRUTH_AVAILABILITY:
    title: "Evaluation window capped to truth availability"
    description: "Evaluator end time is capped to max(truth_ts)-H; do not score on missing/filled defaults when truth is incomplete."

  FM_SCHEMA_CONTRACT_DRIFT_GUARDED:
    title: "Schema/contract drift guarded"
    description: "Proto/DDL/framing verified; decode failures/default-zero dominance treated as P0; versioning/lineage present."

  FM_TOPIC_FRAMING_DRIFT_GUARDED:
    title: "Topic framing drift guarded"
    description: "Schema Registry vs ProtobufSingle framing is detected/validated; decode errors are P0 (no silent continue/defaults)."

  FM_DEFAULT_ZERO_DOMINANCE:
    title: "No default-zero dominance"
    description: "New numeric fields are not silently all-zeros due to schema drift; zeros are validated as intentional."

  FM_NO_HASATTR_FIELD_GUARDS:
    title: "No hasattr/field-presence guards (schema drift smell)"
    description: "Producers/consumers do not branch on pb2 field presence to avoid setting fields; required fields are asserted at startup."

  FM_PRODUCER_OVERLAP_GUARDED:
    title: "Overlapping producers guarded"
    description: "Producer instance identity is present and monitored to prevent multiple writers emitting into the same sink/topic silently."

  FM_DEDUPE_POST_RESTART_SAFE:
    title: "Dedupe post-restart is safe"
    description: "Idempotency/dedup views exist so restarts cannot create duplicate rows; stream keys and dedup windows are correct."

  FM_COST_SEMANTICS_DECLARED:
    title: "Cost semantics declared (gross vs net)"
    description: "Alpha/decision outputs declare cost mode; cost decomposition is consistent; no silent 'net' confusion."

  FM_COST_DOUBLE_COUNT_CHECK:
    title: "No double-/triple-cost subtraction"
    description: "If alpha is net-of-cost/hurdle already, downstream does not subtract costs again."

  FM_COST_TARGET_MATCH_DECLARED:
    title: "Cost target match declared (what are we predicting?)"
    description: "Predicted cost target matches truth target (slippage vs markout vs fee+markout) and quantiles compare p95↔p95 (not p95↔mean)."

  FM_COST_TRUTH_HORIZON_MATCH:
    title: "Cost truth horizon match (auto-select hazards)"
    description: "Truth horizon used by evaluator matches the declared horizon or is recorded as auto-selected; runs with mismatched horizons are not compared."

  FM_COST_TRUTH_FILL_NO_FUTURE:
    title: "Cost truth filling does not use future"
    description: "No forward-fill from t+Δ into earlier buckets at window head; missing truth leads to skip/fail-closed, not future leakage."

  FM_DECISION_GATES_EX_ANTE:
    title: "Decision-time gates are ex-ante"
    description: "Gates at t do not use t+H realized quantities (exit spread/cost); ex-ante gate cost is separated from realized costs."

  FM_FAIL_CLOSED_MEANS_FLATTEN:
    title: "Fail-closed means flatten"
    description: "When upstream is unsafe/ok=false, system fails closed and flattens exposure (not just blocks new entries)."

  FM_EVAL_WINDOW_AVAILABILITY_INTERSECTION:
    title: "Eval window clamped to stream intersection"
    description: "Score only where all required streams/truth exist; do not silently include periods with missing topics/tables or default fills."

  FM_PURGED_CV_EMBARGO_ENFORCED:
    title: "Purged CV / embargo enforced"
    description: "Train/test splits enforce embargo >= horizon (and lookback) so label windows do not overlap the boundary."

  FM_LABEL_DEGENERACY_GATED:
    title: "Label degeneracy gated"
    description: "Report pos_rate/zero_rate and gate invalid labels (saturated touch, too many zeros) so AUC/R² are not misleading."

  FM_OBJECTIVE_MISMATCH_EVAL_PROXY_GUARDED:
    title: "Objective mismatch (eval proxy vs executed policy) guarded"
    description: "Artifacts declare exec_policy_version; training/eval align to executed ledger truth (no optimizing on a proxy different from live)."

  FM_PRICE_MARK_SANITY_GUARDED:
    title: "Price/mark sanity guarded"
    description: "Mark/price truth sanity checked (outliers, bad timestamps, venue contamination); joins constrain (venue,instrument)."

  FM_L2_MICROSTRUCTURE_SANITY_GUARDED:
    title: "L2 microstructure sanity guarded"
    description: "Guard crossed/locked/zero books, microprice==0 anomalies, and depth/flow unit bugs that poison derived features."

  FM_BBO_SPREAD_GLITCH_GUARDED:
    title: "BBO/spread glitch contamination guarded"
    description: "Spread outliers are masked/clamped/DQ-failed; simulator does not earn implausible spread_capture due to data glitches."

  FM_QUANTITY_UNITS_NORMALIZED:
    title: "Quantity units normalized (contracts vs base)"
    description: "Venue/instrument quantities are normalized deterministically (e.g., to USD notional); unit mismatches are detected via probes/alerts."

  FM_VENUE_INSTRUMENT_JOIN_KEYS_STRICT:
    title: "Venue+instrument join keys strict"
    description: "Truth/features are joined with (venue,instrument,market_kind) constraints to avoid instrument collisions and venue-mixed labels."

  FM_TTL_LAG_DROPS_MONITORED:
    title: "TTL/lag drops monitored (no-signal masquerade)"
    description: "Consumer lag/TTL drops are tracked and attributed so no-trade is not mistaken for no-edge; avoid silent stale-drop behavior."

  FM_SEEK_TO_END_ON_ASSIGN_EXPLICIT:
    title: "Seek-to-end on assign is explicit (not default)"
    description: "Seek-to-end/backlog-drop is an explicit knob; in canary/shadow it is off so backlog issues are visible and diagnosable."

  FM_KILL_SWITCH_GUARDED:
    title: "Kill-switch configs guarded"
    description: "Detect config patterns like conf_fracs all-zero or risk floors that collapse liveness/universe; alert and fail-safe."

  FM_SYSTEMD_CONFIG_ATTESTATION:
    title: "systemd/config attestation"
    description: "Runtime logs attest effective config (topics, model path hashes, env vars used); evaluator refuses scoring if drift is detected."

  FM_CLICKHOUSE_MUTATION_BACKLOG_GUARDED:
    title: "ClickHouse mutation backlog guarded"
    description: "Truth sinks avoid frequent DELETE mutations; system.mutations backlog is monitored and blocks dependent evaluations when unhealthy."

  FM_ASYNC_INSERT_DEDUPE_SAFE:
    title: "Async insert dedupe safety"
    description: "If async_insert and idempotency tokens are used, dedup is enabled and tables are configured to avoid duplicate writes."

  FM_KAFKA_DELIVERY_ERROR_COMMIT_RECOVERY:
    title: "Kafka delivery-error → commit recovery"
    description: "One delivery error cannot permanently block commits/flush; telemetry exists and recovery resumes commits after broker recovers."

regression_pack:
  - id: RT_MISSINGNESS_PARITY
    title: "Missingness parity regression"
    description: "Missing features stay NaN in inference if trained with NaN; no implicit 0-fill."
  - id: RT_NO_HEARTBEAT_TRAIN
    title: "No heartbeat training"
    description: "Learner state does not update on heartbeat-only messages."
  - id: RT_EMBARGO_SPLIT
    title: "Embargo split (no label overlap)"
    description: "Train/test split enforces embargo >= horizon so label windows do not overlap the boundary."
  - id: RT_NO_PRE_ENTRY_BARRIER
    title: "No pre-entry barrier exit"
    description: "Synthetic pre-entry bar crossing stop cannot trigger exit; exit_ts always >= entry_ts."
  - id: RT_NO_WITHIN_BUCKET_LOOKAHEAD
    title: "No within-bucket lookahead"
    description: "Merged feature timestamps never exceed base timestamps (no argMax lookahead)."
  - id: RT_NO_FORWARD_DATE_LATE_EVENTS
    title: "No forward-dating late events"
    description: "Watermark reorder/drop; never clamp late events into current bucket."
  - id: RT_BACKFILL_CLOCK
    title: "Backfill clock consistency"
    description: "Replay/backfill uses end_utc clock, not wall-clock now."
  - id: RT_GATE_EX_ANTE
    title: "Ex-ante gating"
    description: "Decision gates do not use exit-time spread/cost; separate gate cost vs realized cost."
  - id: RT_SCHEMA_DRIFT_DEFAULT_ZERO
    title: "Schema drift / default zero dominance"
    description: "New numeric fields cannot be 100% zeros without explicit allowlist; contract mismatch fails closed."
  - id: RT_DEDUPE_SAFETY
    title: "Dedupe safety"
    description: "Post-restart, (stream, ts_event) uniqueness holds; ClickHouse dedup views exist and are correct."
  - id: RT_COST_MODE_NO_DOUBLE_COUNT
    title: "Cost mode / no double count"
    description: "If alpha is net-of-hurdle, downstream does not subtract cost again; shorts pay costs correctly (no sign bugs)."
  - id: RT_FAIL_CLOSED_FLATTEN
    title: "Fail-closed flatten"
    description: "ok=false forces immediate flatten and blocks new entries."
  - id: RT_SYSTEMD_ATTESTATION
    title: "systemd attestation"
    description: "Startup logs show applied config hash, subscribed topics, and model hashes; advertised env vars are actually used."
