# FixReport Meta Synthesis — YAML schema (human spec)
#
# Purpose:
# - "Meta FixReports" are *important overview artefacts* that synthesize multiple existing FixReports
#   into one durable, highly linked reference.
# - They remain valid FixReports (top-level `fixreport` block follows vocab.yaml requirements),
#   but additionally carry a structured `meta_fixreport` block.
# - By default, the source FixReports are tagged `archived` and linked to the new Meta FixReport
#   so the FixReports overview stays decluttered while preserving historic access via links.
#
# Storage location:
# - Stored alongside normal FixReports under: artifacts/stores/fixreport/reports/BF*.yml
#
# Compatibility:
# - The `fixreport` tool validates `fixreport` fields against vocab.yaml.
# - Extra keys (like `meta_fixreport`) are allowed and ignored by vocab validation.
# - Portal UI renders `meta_fixreport` specially when present.
#
# Schema evolution:
# - Increment `meta_fixreport.schema_version` on any breaking changes.

meta_fixreport_schema_version: 1

meta_fixreport:
  schema_version: 1               # required int
  kind: synthesis                 # required enum: [synthesis]

  # The FixReports this meta report synthesizes (truth anchors).
  # Must be BF ids like "BF000123".
  source_fixreport_ids: []        # required list[str]

  # Optional: per-source metadata (ordered, can include additional context).
  sources:                        # optional list[object]
    - bf_id: BF000123
      title: ""
      ts_utc: ""
      severity: ""
      repo_area: ""
      target_kind: ""
      target_path: ""
      scope: ""
      mode: ""
      bug_type: ""
      symptom: ""
      root_cause: ""
      failure_mode: ""
      fix_type: ""
      impact_area: ""
      verification: ""

  # Derived cross-links and the "expanded" artefact set the synthesis considers.
  derived:                        # optional object
    script_paths: []              # list[str] repo-relative paths
    systemd_units: []             # list[str]
    contracts: []                 # list[str]
    topics: []                    # list[str]
    tables_views: []              # list[str]
    task_ids: []                  # list[str]
    hypothesis_ids: []            # list[str]
    ops_msg_ids: []               # list[str]
    audit_ids: []                 # list[str]
    extra_links: []               # list[str] link tokens (kind:id)

  # The actual synthesis content (human-readable but structured).
  synthesis:                      # required object
    executive_summary: []         # list[str] (short bullets)
    incident_hypotheses:          # list[object]
      - hypothesis: ""
        evidence_bf_ids: []       # subset of source_fixreport_ids
    patterns:                     # list[object]
      - pattern: ""
        signals_to_check: []      # list[str]
        prevention_actions: []    # list[str]
        evidence_bf_ids: []       # subset of source_fixreport_ids
    root_cause_clusters:          # list[object]
      - root_cause: ""
        summary: ""
        example_bf_ids: []        # subset of source_fixreport_ids
    recommended_queries: []       # list[str] (e.g. "root_cause=wrong_units impact_area=pnl")
    uncertainties: []             # list[str]

  # Research trace (optional, for auditability).
  research:                       # optional object
    git_log:                      # list[object]
      - path: ""
        commits: []               # list[str] (e.g. "8f26280 2026-01-15 Fix ...")
    scripthistory:                # list[object]
      - path: ""
        last_events:              # list[object]
          - type: ""
            created_at: ""
            agent: ""
            comment: ""
    notes: ""                     # free-form
