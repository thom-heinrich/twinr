# Template for `report create --data-file <this.yml>`
#
# Quality gates are strict by design. Minimal reports are rejected.
# Required depth highlights:
# - summary >= 2 explanatory bullets
# - insights >= 3 explanatory bullets
# - evidence >= 2 entries (each with explanatory note)
# - context.objective/scope/methodology/data_window
# - results.narrative + KPI list (benchmark/test: >=3 KPI + tests section)
# - limitations >=1, risks >=1, next_actions >=3, repro >=1
#
# Example invocation:
#   report create --data-file /path/to/report_data.yml

title: "Benchmark: Reader v6 against Reader v5 on HOLD45"
kind: benchmark  # one of: research|benchmark|deployment|ops|release|other
tags:
  - "benchmark"
  - "test"
  - "holdout"
  - "reader"

summary:
  - "Reader v6 was evaluated against Reader v5 on HOLD45 with a fixed question-id set and deterministic retrieval config; this report captures measurable deltas and operational implications."
  - "Across the guarded test suite, v6 improves answer quality and calibration while keeping runtime variance bounded under the same retry and timeout policy."

insights:
  - "Most of the gain comes from stricter evidence gating in multi-hop items, which reduces unsupported high-confidence outputs without collapsing answer rate."
  - "Temporal-anchor normalization contributes disproportionally on when/date buckets and removes previously observed day-shift errors."
  - "Residual misses are concentrated in low-coverage contexts, indicating retrieval breadth remains the next limiting factor rather than reader scoring logic."

context:
  objective: "Verify that Reader v6 improves reliability and correctness over Reader v5 on the canonical HOLD45 evaluation without introducing runtime regressions."
  scope: "Evaluation covers the deterministic holdout question set, identical retrieval budget, identical model lane, and same fail-closed policy as prior baseline."
  methodology: "Paired benchmark run with fixed seeds and fixed question IDs; compare answer quality, grounding fidelity, calibration, runtime, and unresolved outcome share."
  data_window: "Runs executed on 2026-02-13 UTC using HOLD45 selection artifact and immutable eval configuration snapshot."

evidence:
  - kind: "artifact"
    ref: "artifacts/evaluations/locomo/20260213_reader_v6_vs_v5/summary.json"
    note: "Primary machine-readable benchmark output containing KPI aggregates, per-question outcomes, and confidence calibration statistics."
  - kind: "artifact"
    ref: "artifacts/evaluations/locomo/20260213_reader_v6_vs_v5/per_question.csv"
    note: "Per-question delta breakdown used to confirm that gains are broad-based and not concentrated in a narrow subset of trivial items."

links:
  - "script:common/locomo/mc_reader.py"
  - "script:scripts/evaluations/run_locomo_eval.py"
  - "task:c032f0889458"

results:
  narrative: "Reader v6 beats Reader v5 on core quality KPIs and reduces unsupported confidence spikes while keeping latency within operational budget; unresolved outcomes fall due to improved retry orchestration."
  kpis:
    - name: "mc10_accuracy"
      value: 0.934
      unit: ""
      split: "holdout"
      baseline: 0.907
      delta: "+0.027"
      explanation: "Accuracy improvement is statistically consistent across open-domain and multi-hop slices; gain is not driven by a single conversation hotspot."
    - name: "unsupported_high_conf_share"
      value: 0.081
      unit: ""
      split: "holdout"
      baseline: 0.142
      delta: "-0.061"
      explanation: "Evidence-aware confidence capping materially reduces unsupported confident outputs, directly addressing prior D-class failure patterns."
    - name: "p95_latency_s"
      value: 8.7
      unit: "s"
      split: "holdout"
      baseline: 8.5
      delta: "+0.2"
      explanation: "Runtime increase is minor relative to quality gains and remains within accepted operational SLO for this benchmark lane."
  tests:
    - name: "HOLD45 deterministic benchmark"
      dataset_or_suite: "LoCoMo HOLD45"
      status: "pass"
      sample_size_n: 45
      kpi_refs: ["mc10_accuracy", "unsupported_high_conf_share", "p95_latency_s"]
      notes: "Run used deterministic question-id file and fixed retrieval policy to guarantee reproducible comparison."

limitations:
  - "The benchmark sample is intentionally narrow (HOLD45) and does not yet represent full-distribution behavior under production traffic diversity."

risks:
  - "Runtime can regress under sustained provider throttling if concurrency controls drift from the validated lane configuration."

next_actions:
  - "Extend benchmark to HOLD200 with the same deterministic harness and verify that KPI deltas remain directionally consistent."
  - "Add targeted retrieval-ablation runs for low-coverage contexts to isolate remaining error mass by evidence density."
  - "Promote v6 candidate only after p95 latency and unresolved-rate remain stable in two consecutive nightly runs."

repro:
  - "conda run -n tessairact python scripts/evaluations/run_locomo_eval.py --profile hold45 --reader v6 --baseline-reader v5 --deterministic --out artifacts/evaluations/locomo/20260213_reader_v6_vs_v5"
