schema_version: 1
name: proactive
path: src/twinr/proactive
kind: python-package
visibility: internal
summary: Provide the package-root export surface and boundary between Twinr's proactive runtime, social-trigger, event-fusion, and governance subsystems.
owned_concerns:
  - Expose the broad `twinr.proactive` package-root import surface across proactive child packages.
  - Define the package boundary between `runtime`, `social`, `event_fusion`, and `governance`.
  - Route new work into the correct proactive child package instead of growing the package root.
out_of_scope:
  - Proactive monitor orchestration and presence-session logic inside `src/twinr/proactive/runtime`.
  - Social-trigger scoring, observation providers, and vision review inside `src/twinr/proactive/social`.
  - Short-window multimodal event buffering, sequence derivation, and fused claims inside `src/twinr/proactive/event_fusion`.
  - Delivery reservation and cooldown policy inside `src/twinr/proactive/governance`.
  - Remote voice-activation transport and transcript commitment in `src/twinr/orchestrator`.
files:
  - path: __init__.py
    role: Root export surface across proactive child packages
    exports:
      - AmbientAudioObservationProvider
      - NullAudioObservationProvider
      - OpenAIVisionObservationProvider
      - OpenAIProactiveVisionReviewer
      - ProactiveAudioSnapshot
      - ProactiveCoordinator
      - ProactiveGovernor
      - ProactiveGovernorCandidate
      - ProactiveGovernorDecision
      - ProactiveGovernorHistoryEntry
      - ProactiveGovernorReservation
      - ProactiveMonitorService
      - ProactiveVisionFrameBuffer
      - ProactiveVisionReview
      - ProactiveVisionSnapshot
      - PresenceSessionController
      - PresenceSessionSnapshot
      - SocialAudioObservation
      - SocialBodyPose
      - SocialFineHandGesture
      - SocialGestureEvent
      - SocialObservation
      - SocialPersonZone
      - SocialTriggerDecision
      - SocialTriggerEngine
      - SocialTriggerEvaluation
      - SocialTriggerPriority
      - SocialTriggerThresholds
      - SocialVisionObservation
      - TriggerScoreEvidence
      - WeightedTriggerScore
      - bool_score
      - build_default_proactive_monitor
      - hold_progress
      - is_reviewable_image_trigger
      - is_safety_trigger
      - parse_proactive_vision_review_text
      - parse_vision_observation_text
      - proactive_observation_facts
      - proactive_prompt_mode
      - recent_progress
      - weighted_trigger_score
subpackages:
  - path: event_fusion
    role: Short-window multimodal event fusion
  - path: governance
    role: Delivery reservation and cooldown policy
  - path: runtime
    role: Proactive monitor orchestration and presence-session control
  - path: social
    role: Social-trigger models, providers, scoring, and vision review
public_api:
  module: twinr.proactive
  exports:
    - AmbientAudioObservationProvider
    - NullAudioObservationProvider
    - OpenAIVisionObservationProvider
    - OpenAIProactiveVisionReviewer
    - ProactiveAudioSnapshot
    - ProactiveCoordinator
    - ProactiveGovernor
    - ProactiveGovernorCandidate
    - ProactiveGovernorDecision
    - ProactiveGovernorHistoryEntry
    - ProactiveGovernorReservation
    - ProactiveMonitorService
    - ProactiveVisionFrameBuffer
    - ProactiveVisionReview
    - ProactiveVisionSnapshot
    - PresenceSessionController
    - PresenceSessionSnapshot
    - SocialAudioObservation
    - SocialBodyPose
    - SocialFineHandGesture
    - SocialGestureEvent
    - SocialObservation
    - SocialPersonZone
    - SocialTriggerDecision
    - SocialTriggerEngine
    - SocialTriggerEvaluation
    - SocialTriggerPriority
    - SocialTriggerThresholds
    - SocialVisionObservation
    - TriggerScoreEvidence
    - WeightedTriggerScore
    - bool_score
    - build_default_proactive_monitor
    - hold_progress
    - is_reviewable_image_trigger
    - is_safety_trigger
    - parse_proactive_vision_review_text
    - parse_vision_observation_text
    - proactive_observation_facts
    - proactive_prompt_mode
    - recent_progress
    - weighted_trigger_score
primary_callers:
  - path: src/twinr/__main__.py
  - path: src/twinr/agent/base_agent/runtime/base.py
  - path: src/twinr/agent/base_agent/runtime/context.py
  - path: src/twinr/agent/workflows/__init__.py
  - path: src/twinr/agent/workflows/realtime_runner.py
  - path: src/twinr/agent/workflows/realtime_runtime/background.py
tests:
  - path: test/test_proactive_governor.py
  - path: test/test_social_triggers.py
  - path: test/test_proactive_vision_review.py
  - path: test/test_proactive_monitor.py
  - path: test/test_realtime_runner.py
  - path: test/test_main.py
