schema_version: 1
name: proactive
path: src/twinr/proactive
kind: python-package
visibility: internal
summary: Provide the package-root compatibility surface and boundary between Twinr's proactive runtime, social-trigger, event-fusion, governance, and wakeword subsystems.
owned_concerns:
  - Expose the broad `twinr.proactive` compatibility import surface across proactive child packages
  - Define the package boundary between `runtime`, `social`, `event_fusion`, `governance`, and `wakeword`
  - Route new work into the correct proactive child package instead of growing the package root
out_of_scope:
  - Proactive monitor orchestration and presence-session logic inside src/twinr/proactive/runtime
  - Social-trigger scoring, observation providers, and vision review inside src/twinr/proactive/social
  - Short-window multimodal event buffering, sequence derivation, and fused claims inside src/twinr/proactive/event_fusion
  - Delivery reservation and cooldown policy inside src/twinr/proactive/governance
  - Wakeword matching, calibration, streaming, and evaluation logic inside src/twinr/proactive/wakeword
files:
  - path: __init__.py
    role: Root compatibility export surface across proactive child packages
    exports:
      - AmbientAudioObservationProvider
      - NullAudioObservationProvider
      - OpenWakeWordPrediction
      - OpenWakeWordStreamingMonitor
      - OpenAIVisionObservationProvider
      - OpenAIProactiveVisionReviewer
      - ProactiveGovernor
      - ProactiveGovernorCandidate
      - ProactiveGovernorDecision
      - ProactiveGovernorHistoryEntry
      - ProactiveGovernorReservation
      - ProactiveAudioSnapshot
      - ProactiveCoordinator
      - ProactiveVisionFrameBuffer
      - ProactiveVisionReview
      - ProactiveMonitorService
      - ProactiveVisionSnapshot
      - PresenceSessionController
      - PresenceSessionSnapshot
      - SocialAudioObservation
      - SocialBodyPose
      - SocialObservation
      - SocialTriggerDecision
      - SocialTriggerEngine
      - SocialTriggerEvaluation
      - SocialTriggerPriority
      - SocialTriggerThresholds
      - SocialVisionObservation
      - TriggerScoreEvidence
      - SttWakewordVerifier
      - WakewordAutotuneRecommendation
      - WakewordBaseModelTrainingReport
      - WakewordCalibrationProfile
      - WakewordCalibrationStore
      - WakewordDecision
      - WakewordDecisionPolicy
      - WakewordEvalEntry
      - WakewordEvalMetrics
      - WakewordEvalReport
      - WakewordVerifierTrainingReport
      - WakewordMatch
      - WakewordOpenWakeWordFrameSpotter
      - WakewordOpenWakeWordSpotter
      - WakewordPhraseSpotter
      - WakewordStreamDetection
      - WakewordVerification
      - WeightedTriggerScore
      - append_wakeword_capture_label
      - apply_wakeword_calibration
