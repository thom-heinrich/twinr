      - normalize_wakeword_verifier_mode
      - phrase_from_detector_label
      - proactive_observation_facts
      - proactive_prompt_mode
      - run_wakeword_eval
      - train_wakeword_base_model_from_dataset_root
      - train_wakeword_custom_verifier_from_manifest
      - wakeword_primary_prompt
      - weighted_trigger_score
subpackages:
  - path: event_fusion
    role: Short-window multimodal event fusion
  - path: governance
    role: Delivery reservation and cooldown policy
  - path: runtime
    role: Proactive monitor orchestration and presence-session control
  - path: social
    role: Social-trigger models, providers, scoring, and vision review
  - path: wakeword
    role: Wakeword detection, calibration, streaming, and evaluation
