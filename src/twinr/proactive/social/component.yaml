schema_version: 1
name: social
path: src/twinr/proactive/social
kind: python-package
visibility: internal
summary: Evaluate proactive social triggers from normalized audio, vision, and motion observations, with optional buffered vision review.
owned_concerns:
  - Define social-trigger domain models, priorities, and configurable thresholds
  - Score stateful trigger candidates from normalized observation ticks
  - Capture bounded audio and vision observations for proactive monitoring
  - Overlay direct ReSpeaker XVF3800 signal facts onto normalized audio observations
  - Preserve conservative ReSpeaker busy-state and direction-quality facts for downstream policy consumers
  - Map the local-first IMX500 adapter onto the normalized social vision contract
  - Map the same normalized social vision contract onto peer-LAN IMX500 observations served by a dedicated helper Pi
  - Route bounded AI-Deck still captures into the continuous OpenAI-backed proactive vision lane when Twinr uses an `aideck://` camera device
  - Stabilize automation-facing camera snapshots, bounded visible-person anchors, coarse motion, and rising-edge coarse/fine gesture events
  - Confirm explicit fine-hand symbols conservatively before the UI or policy layers see them, so random single-frame positives do not become user-facing acknowledgements
  - Load bounded per-symbol fine-hand calibration so ambiguous symbols such as `ok_sign` or `middle_finger` can be stricter than `thumbs_up` or `pointing`
  - Share low-risk social-contract normalization helpers across modules without duplicating hot-path coercion logic
  - Route prompt mode and render bounded evidence facts for proactive prompting
  - Buffer recent frames and request conservative visual second opinions
out_of_scope:
  - Proactive monitor orchestration and worker lifecycle
  - Delivery-governance cooldown policy after candidate emission
  - Raw hardware adapter implementations outside runtime-facing wrappers
  - Speech delivery, printing, and long-term proactive planning
files:
  - path: __init__.py
    role: Package export surface for social-trigger helpers
    exports:
      - AmbientAudioObservationProvider
      - NullAudioObservationProvider
      - OpenAIVisionObservationProvider
      - OpenAIProactiveVisionReviewer
      - ProactiveAudioSnapshot
      - ProactiveVisionFrameBuffer
      - ProactiveVisionReview
      - ProactiveVisionSnapshot
      - SocialAudioObservation
      - SocialBodyPose
      - SocialFineHandGesture
      - SocialGestureEvent
      - SocialObservation
      - SocialPersonZone
      - SocialTriggerDecision
      - SocialTriggerEngine
      - SocialTriggerEvaluation
      - SocialTriggerPriority
      - SocialTriggerThresholds
      - SocialVisionObservation
      - TriggerScoreEvidence
      - WeightedTriggerScore
      - bool_score
      - hold_progress
      - is_reviewable_image_trigger
      - is_safety_trigger
      - parse_proactive_vision_review_text
      - parse_vision_observation_text
      - proactive_observation_facts
      - proactive_prompt_mode
      - recent_progress
      - weighted_trigger_score
  - path: engine.py
    role: Stateful social-trigger models, thresholds, selection logic, and normalized visible-person observations
    exports:
      - SocialAudioObservation
      - SocialBodyPose
      - SocialDetectedObject
      - SocialFineHandGesture
      - SocialGestureEvent
      - SocialMotionState
      - SocialObservation
      - SocialPersonZone
      - SocialSpatialBox
      - SocialTriggerDecision
      - SocialTriggerEngine
      - SocialTriggerEvaluation
      - SocialTriggerPriority
      - SocialTriggerThresholds
      - SocialVisionObservation
  - path: camera_surface.py
    role: Legacy-compatible public wrapper for camera snapshot and event stabilization
    exports:
      - ProactiveCameraSnapshot
      - ProactiveCameraSurface
      - ProactiveCameraSurfaceConfig
      - ProactiveCameraSurfaceUpdate
  - path: camera_surface_impl/config.py
    role: Camera-surface config defaults plus validation for cadence and smoothing bounds
  - path: camera_surface_impl/models.py
    role: Snapshot and update dataclasses rendered by the camera surface
  - path: camera_surface_impl/signals.py
    role: Debounced boolean and stable-object trackers reused by the camera surface
  - path: camera_surface_impl/presence.py
    role: Presence, health, motion, and secondary-field stabilization helpers for the camera surface
  - path: camera_surface_impl/gestures.py
    role: Coarse/fine gesture stabilization helpers for the camera surface
  - path: camera_surface_impl/surface.py
    role: Main camera-surface orchestration implementation behind the public wrapper
  - path: gesture_calibration.py
    role: Load bounded per-symbol fine-hand calibration for the live social camera surface
    exports:
      - FineHandGesturePolicy
      - GestureCalibrationProfile
  - path: aideck_camera_provider.py
    role: Bounded continuous AI-Deck still-camera provider that feeds the OpenAI proactive vision classifier from aideck:// captures
    exports:
      - AIDeckOpenAIVisionObservationProvider
      - AIDeckOpenAIVisionProviderConfig
  - path: local_camera_provider.py
    role: Local-first IMX500 + MediaPipe provider mapped onto the social vision contract, preferring explicit adapter stream attention/gesture methods for productive HDMI refresh while preserving the stable provider surface
    exports:
      - LocalAICameraObservationProvider
      - LocalAICameraProviderConfig
  - path: normalization.py
    role: Shared low-risk enum, box, and integer coercion helpers reused by social hot paths
    exports:
      - coerce_enum_member
      - coerce_non_negative_int_or_default
      - coerce_spatial_box_coordinates
  - path: observers.py
    role: Ambient-audio, ReSpeaker-overlay, and still-camera observation providers
    exports:
      - AmbientAudioObservationProvider
      - NullAudioObservationProvider
      - OpenAIVisionObservationProvider
      - ProactiveAudioSnapshot
      - ProactiveVisionSnapshot
      - ReSpeakerAudioObservationProvider
      - parse_vision_observation_text
  - path: prompting.py
    role: Prompt-mode routing and bounded evidence rendering
    exports:
      - is_safety_trigger
      - proactive_observation_facts
      - proactive_prompt_mode
  - path: scoring.py
    role: Weighted score, hold-progress, and evidence helpers
    exports:
      - TriggerScoreEvidence
      - WeightedTriggerScore
      - bool_score
      - clamp_unit
      - hold_progress
      - recent_progress
      - weighted_trigger_score
  - path: vision_review.py
    role: Buffered vision review policy and structured response parsing
    exports:
      - OpenAIProactiveVisionReviewer
      - ProactiveVisionFrameBuffer
      - ProactiveVisionReview
      - is_reviewable_image_trigger
      - parse_proactive_vision_review_text
