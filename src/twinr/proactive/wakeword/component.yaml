schema_version: 1
name: wakeword
path: src/twinr/proactive/wakeword
kind: python-package
visibility: internal
summary: Provide wakeword matching, local KWS/openWakeWord spotting, optional local verifier support, sequence-aware cascade verification, verification policy, calibration profiles, streaming detection, runtime-faithful promotion replay, and offline evaluation/training helpers for proactive runtime.
owned_concerns:
  - Normalize wakeword transcripts, configured phrases, and detector labels
  - Run local openWakeWord or sherpa-onnx KWS clip and frame spotting plus optional local verifier, sequence-aware cascade verification, and STT verification
  - Provision official sherpa-onnx KWS bundle assets and generate Twinr keyword files reproducibly from the leading repo
  - Persist and apply per-device wakeword calibration overrides
  - Replay labeled captures for evaluation, operator labeling, verifier training, autotune recommendations, post-training acceptance checks, and runtime-faithful promotion guards
  - Train reproducible Twinr base models from generated wakeword datasets and export local ONNX assets
  - Render the canonical Stage-1 family, hard-negative mining, and Pi acceptance plan for future retrains
  - Stream bounded PCM frames into wakeword detections for proactive runtime
out_of_scope:
  - Presence-session arming and proactive monitor orchestration in src/twinr/proactive/runtime
  - Social trigger scoring or proactive governance policy
  - Raw microphone capture implementations outside the wakeword streaming boundary
  - Web/dashboard rendering of wakeword settings
files:
  - path: __init__.py
    role: Package export surface for wakeword helpers
    exports:
      - DEFAULT_WAKEWORD_PHRASES
      - OpenWakeWordPrediction
      - OpenWakeWordStreamingMonitor
      - SttWakewordVerifier
      - WakewordAutotuneRecommendation
      - WakewordBaseModelTrainingReport
      - WakewordCalibrationProfile
      - WakewordCalibrationStore
      - WakewordDecision
      - WakewordDecisionPolicy
      - WakewordEvalEntry
      - WakewordEvalMetrics
      - WakewordEvalReport
      - WakewordKwsAssetBundle
      - WakewordVerifierTrainingReport
      - WakewordMatch
      - WakewordOpenWakeWordFrameSpotter
      - WakewordOpenWakeWordSpotter
      - WakewordPhraseSpotter
      - WakewordSherpaOnnxFrameSpotter
      - WakewordSherpaOnnxSpotter
      - WakewordSequenceCaptureVerifier
      - WakewordSequenceVerifier
      - WakewordSequenceVerifierTrainingReport
      - WakewordStreamDetection
      - WakewordVerification
      - append_wakeword_capture_label
      - apply_wakeword_calibration
      - autotune_wakeword_profile
      - load_eval_manifest
      - load_labeled_ops_captures
      - match_wakeword_transcript
      - normalize_detector_label
      - normalize_wakeword_backend
      - normalize_wakeword_verifier_mode
      - phrase_from_detector_label
      - run_wakeword_eval
      - train_wakeword_base_model_from_dataset_root
      - train_wakeword_custom_verifier_from_manifest
      - train_wakeword_sequence_verifier_from_manifest
      - wakeword_primary_prompt
  - path: cascade.py
    role: Train and run Twinr's second-stage sequence verifier assets with temporal alignment over localized captures
    exports:
      - WakewordSequenceCaptureVerifier
      - WakewordSequenceVerifier
      - WakewordSequenceVerifierTrainingReport
      - train_wakeword_sequence_verifier_from_manifest
  - path: matching.py
    role: Transcript normalization and phrase matching
    exports:
      - DEFAULT_WAKEWORD_PHRASES
      - WakewordMatch
      - WakewordPhraseSpotter
      - match_wakeword_transcript
      - normalize_detector_label
      - phrase_from_detector_label
      - wakeword_primary_prompt
  - path: kws.py
    role: sherpa-onnx KWS asset validation plus clip and frame spotters
    exports:
      - WakewordKwsAssetBundle
      - WakewordSherpaOnnxFrameSpotter
      - WakewordSherpaOnnxSpotter
  - path: kws_assets.py
    role: Official sherpa-onnx bundle provisioning and Twinr keyword generation
    exports:
      - ProvisionedWakewordKwsBundle
      - WakewordKwsProvisionSpec
      - available_builtin_kws_bundle_specs
      - derive_kws_keyword_names
      - provision_builtin_kws_bundle
  - path: spotter.py
    role: openWakeWord clip and frame spotters
    exports:
      - OpenWakeWordPrediction
      - WakewordOpenWakeWordFrameSpotter
      - WakewordOpenWakeWordSpotter
  - path: policy.py
    role: Detection decision policy and STT verification
    exports:
      - SttWakewordVerifier
      - WakewordDecision
      - WakewordDecisionPolicy
      - WakewordVerification
      - normalize_wakeword_backend
      - normalize_wakeword_verifier_mode
  - path: calibration.py
    role: Calibration profile model and config application
    exports:
      - WakewordCalibrationProfile
      - WakewordCalibrationStore
      - apply_wakeword_calibration
  - path: evaluation.py
    role: Manifest replay, labeling, verifier training, eval, and autotune helpers
    exports:
      - WakewordAutotuneRecommendation
      - WakewordEvalEntry
      - WakewordEvalMetrics
      - WakewordEvalReport
      - WakewordVerifierTrainingReport
      - append_wakeword_capture_label
      - autotune_wakeword_profile
      - load_eval_manifest
      - load_labeled_ops_captures
      - run_wakeword_eval
      - train_wakeword_custom_verifier_from_manifest
  - path: promotion.py
    role: Runtime-faithful stream replay, promotion spec loading, suite gating, and ambient false-accepts/hour reports
    exports:
      - WakewordAmbientGuardResult
      - WakewordAmbientGuardSpec
      - WakewordPromotionReport
      - WakewordPromotionSpec
      - WakewordPromotionSuiteResult
      - WakewordPromotionSuiteSpec
      - WakewordStreamEvalReport
      - evaluate_wakeword_stream_entries
      - load_wakeword_promotion_spec
      - run_wakeword_promotion_eval
      - run_wakeword_stream_eval
  - path: training.py
    role: Base-model training, ONNX export, and runtime-faithful acceptance-threshold selection
    exports:
      - WakewordBaseModelTrainingReport
      - train_wakeword_base_model_from_dataset_root
  - path: training_plan.py
    role: Canonical Stage-1 family, hard-negative mining, and Pi acceptance plan rendering
    exports:
      - WakewordAcceptanceMetricPlan
      - WakewordTrainingCommand
      - WakewordTrainingPlan
      - build_default_wakeword_training_plan
      - render_wakeword_training_plan_markdown
  - path: stream.py
    role: Bounded arecord-based streaming monitor
    exports:
      - OpenWakeWordStreamingMonitor
      - WakewordStreamDetection
