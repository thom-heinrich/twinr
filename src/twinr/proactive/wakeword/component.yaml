schema_version: 1
name: wakeword
path: src/twinr/proactive/wakeword
kind: python-package
visibility: internal
summary: Provide wakeword matching, local KWS/openWakeWord spotting, optional local verifier support, sequence-aware cascade verification, verification policy, calibration profiles, streaming detection, runtime-faithful promotion replay, and offline evaluation/training helpers for proactive runtime.
owned_concerns:
  - Normalize wakeword transcripts, configured phrases, and detector labels
  - Extract continuation text from confirmed-wake captures even when the tail STT omits the already-confirmed wake phrase
  - Run local openWakeWord, sherpa-onnx KWS, or WeKws clip and frame spotting plus optional local verifier, sequence-aware cascade verification, and STT verification
  - Provision official sherpa-onnx KWS bundle assets and generate Twinr keyword files reproducibly from the leading repo
  - Persist and apply per-device wakeword calibration overrides
  - Replay labeled captures for evaluation, operator labeling, verifier training, autotune recommendations, post-training acceptance checks, and runtime-faithful promotion guards
  - Train reproducible Twinr base models from generated wakeword datasets and export local ONNX assets
  - Export labeled Twinr manifests into WeKws/Kaldi-style split directories for custom conventional KWS training
  - Prepare reproducible WeKws experiment workspaces, configs, and runner scripts from exported Twinr datasets
  - Plan deterministic large synthetic Qwen3TTS wakeword corpora with speaker/style/degradation diversity and asymmetric positive-vs-negative runs for custom conventional KWS retrains
  - Render the canonical Stage-1 family, hard-negative mining, and Pi acceptance plan for future retrains
  - Stream bounded PCM frames into wakeword detections for proactive runtime
out_of_scope:
  - Presence-session arming and proactive monitor orchestration in src/twinr/proactive/runtime
  - Social trigger scoring or proactive governance policy
  - Raw microphone capture implementations outside the wakeword streaming boundary
  - Web/dashboard rendering of wakeword settings
files:
  - path: __init__.py
    role: Package export surface for wakeword helpers
    exports:
      - DEFAULT_WAKEWORD_PHRASES
      - OpenWakeWordPrediction
      - OpenWakeWordStreamingMonitor
      - SttWakewordVerifier
      - WakewordAutotuneRecommendation
      - WakewordBaseModelTrainingReport
      - WakewordCalibrationProfile
      - WakewordCalibrationStore
      - WakewordDecision
