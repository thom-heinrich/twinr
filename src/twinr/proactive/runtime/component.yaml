schema_version: 1
name: runtime
path: src/twinr/proactive/runtime
kind: python-package
visibility: internal
summary: Coordinate proactive monitor ticks, activation presence sessions, and bounded monitor lifecycle for Twinr runtime workflows.
owned_concerns:
  - Maintain activation presence-session state from camera, PIR, and speech activity
  - Derive conservative ReSpeaker policy hooks such as quiet windows, resume windows, and overlap guards
  - Expose one runtime-faithful ReSpeaker audio-perception diagnostic and guard surface for operator checks and post-recovery sanity validation
  - Derive conservative ReSpeaker speech-delivery defer reasons for display-first proactive routing
  - Use bounded local PCM-content evidence to veto strong XVF3800 speech false positives before room-context and device-directedness decisions
  - Let strong PCM non-speech evidence reopen bounded room-activity when the legacy chunk/RMS gate misses playback windows
  - Enforce a hard XVF3800 startup/runtime contract so DFU/safe mode and unreadable enumerated capture block proactive voice monitoring clearly
  - Package current ReSpeaker presence/audio facts into explicit governor-facing input bundles
  - Fuse the primary camera anchor with ReSpeaker direction confidence into a conservative speaker-association fact
  - Derive a bounded multimodal initiative state that later proactive behavior can use for display-first or skip decisions
  - Derive an explicit ambiguous-room guard before any person-targeted runtime inference proceeds
  - Derive a bounded temporal identity-fusion surface from voice, portrait, household-voice candidates, visual-anchor history, and presence-session memory without promoting it to identity proof
  - Derive a conservative portrait-match claim from local face embedding plus temporal local identity evidence and clear room context
  - Derive a conservative known-user hint from fresh voice-profile state plus optional temporal identity-fusion evidence and clear room context
  - Derive prompt-only affect proxies from coarse posture, attention, quiet, and motion cues without claiming emotion as fact
  - Derive bounded layered runtime context from merged local plus smart-home facts while keeping same-room mapping explicit and local interaction truth on-device
  - Aggregate the current presence, attention, conversation, safety, identity, room-clarity, and smart-home context surfaces into one explicit bounded person-state schema for downstream runtime policy
  - Derive a bounded continuous visible-person target from multi-person camera anchors, motion recency, short-horizon prediction, conservative audio-to-vision speaker handoff, and short stale-track bridging across brief detector misses
  - Derive a bounded multimodal attention-target surface from camera anchor, visible-person tracks, speaker association, showing-intent cues, and short-lived session focus memory, with speaker and last-motion priority preserved in multi-person scenes
  - Drive calm HDMI face attention-follow cues from the current relevant-person anchor without teaching the generic runtime snapshot schema about gaze-follow behavior, while mirroring camera-space anchors into user-facing gaze, adding small near-center head turns before full side gaze commits, reserving stronger up/down body-language poses for explicit semantic cues, and renewing or briefly holding matching cues before they expire or disappear on short camera dropouts
  - Publish bounded HDMI header debug pills from current camera facts plus brief event/trigger holds so Pi debugging can inspect camera and fusion state without widening the generic runtime snapshot schema
  - Fan that same conservative attention target out to an optional bounded body-follow servo so physical turning reuses the HDMI attention policy instead of inventing a second targeting path
  - Persist a bounded continuous HDMI attention debug stream with per-refresh outcome codes, stage timings, and camera/target/cue state so transient eye-follow dropouts leave first-run evidence
  - Keep a dedicated live-gesture acknowledgement lane separate from the broader social camera-surface path so user-facing symbol latency does not regress eye-follow or depend on full proactive observation cadence
  - Derive a bounded visual wakeup decision from one configured fine-hand symbol without coupling it to HDMI emoji acknowledgement or workflow orchestration
  - Dispatch accepted visual wakeups through a dedicated single-flight background worker so Peace-sign listening sessions do not block HDMI attention refresh ticks
  - Mirror clear stabilized user camera gestures into short-lived HDMI emoji acknowledgements without touching the face channel or overwriting foreign emoji cues
  - Publish sparse personality-driven HDMI reserve impulses only when quiet-hours, cadence, presence, and reserve-surface ownership all allow it
  - Blend right-lane ambient companion candidates from personality, durable memory hooks, slower reflection summaries, and long-horizon shown-card outcome learning through one modular orchestration path
  - Backfill additional reserve-lane semantic topics from latent personality snapshot continuity, relationship, place, and concrete world-signal state when stronger explicit loaders stay sparse
  - Expand grounded semantic reserve topics into multiple deterministic card surfaces while preserving one shared semantic topic key for answer-based retirement, feedback, and learning
  - Keep reserve-card writer/judge gold examples plus the shared quality rubric in one focused copy-contract module so prompt assets stay small, versioned, and family-generic
  - Blend reserve-lane candidates from personality state plus durable memory follow-up and clarification hooks so ambient prompts can also strengthen Twinr's long-term memory
  - Publish guided user-discovery start, resume, and short profile-review invitations into the same reserve lane so lifelong profile learning stays visible without a second profile UI
  - Derive direct reserve-lane world candidates from active RSS subscriptions and condensed awareness threads so seeded world breadth still reaches the right-hand lane when other sources are temporarily sparse
  - Rewrite reserve-lane wording through one bounded structured LLM pass at plan-build time so the visible text can reflect Twinr's current personality and structured shared-thread or memory-follow-up context without templated phrasing
  - Keep reserve-lane text, timestamp, and local-time normalization in one shared support module so the planner and live publishers do not drift apart on small helper rules
  - Record shown reserve cards into a bounded exposure history so later learning code can tell which visual prompts were actually seen before it scores user reactions
  - Run one explicit overnight reserve-lane maintenance step that reviews recent shown-card outcomes, triggers long-term reflection/world refresh, and prepares the next local-day plan before morning adoption
  - Persist a bounded continuous HDMI gesture debug stream with raw observations, ack-lane decisions, publish outcomes, and stage timings so Pi-side symbol latency and missed acknowledgements leave first-run evidence
  - Run a bounded local HDMI attention-refresh cadence so gaze-follow stays responsive even when full proactive inspection remains motion-gated
  - Block sensitive proactive behavior when current ReSpeaker plus camera context is ambiguous
  - Coordinate proactive monitor ticks across vision, PIR, ambient audio, and activation-presence policy paths
  - Retry exact transient GPIO busy overlaps for PIR startup over a short bounded handover window so runtime restarts do not flap into error while a previous Twinr process is still releasing GPIO17
  - Preserve proactive audio ownership boundaries around accepted hands-free turns so exclusive ALSA conversation capture can reuse the same microphone device safely
  - Export normalized observation facts and ops telemetry from runtime monitoring
  - Route short-window multimodal event-fusion safety claims into the active runtime trigger path while preserving engine cooldowns, visibility-loss fallback, and downstream review/suppression policy
  - Export structured ReSpeaker audio-policy facts plus presence-session metadata for bounded automation and long-term memory ingestion
  - Wrap targeted ReSpeaker XVF3800 audio paths with direct signal facts plus readable-frame startup/runtime blocking when capture dies
  - Require sustained bounded readable-frame success before a targeted ReSpeaker startup path leaves error state, so unstable USB enumeration cannot flap Twinr between ok and error
  - Schedule heavy XVF3800 host-control polling more slowly than the cheap ambient-audio path when the room is idle
  - Keep bounded ReSpeaker audio observation active during `answering` so interruption facts remain observable
  - Emit explicit operator-readable ReSpeaker runtime alerts for DFU, disconnect, unreadable capture, and recovery transitions
  - Open and close monitor resources and the bounded worker thread safely
out_of_scope:
  - Social trigger scoring thresholds, evidence rules, or prompt content
  - Voice-activation transcript policy and gateway contracts
  - Raw hardware adapter implementations outside the runtime-facing orchestration
  - Delivery-governance cooldown policy in src/twinr/proactive/governance
files:
  - path: __init__.py
    role: Package export surface for proactive runtime helpers
    exports:
      - PresenceSessionController
      - PresenceSessionSnapshot
      - ProactiveCoordinator
      - ProactiveMonitorService
      - ReSpeakerMultimodalInitiativeSnapshot
      - ReSpeakerSpeakerAssociationSnapshot
      - ReSpeakerSensitiveBehaviorGateDecision
      - build_default_proactive_monitor
      - derive_respeaker_multimodal_initiative
      - derive_respeaker_speaker_association
      - evaluate_respeaker_sensitive_behavior_gate
  - path: audio_policy.py
    role: Conservative ReSpeaker policy-hook, speech-defer, and runtime alert mapping
    exports:
      - ReSpeakerAudioPolicySnapshot
      - ReSpeakerAudioPolicyTracker
      - describe_respeaker_runtime_alert
  - path: audio_perception.py
    role: Runtime-faithful one-shot ReSpeaker perception diagnostics and conservative room/device-directedness guard summaries
    exports:
      - ReSpeakerAudioPerceptionGuardSnapshot
      - ReSpeakerAudioPerceptionSnapshot
      - derive_respeaker_audio_perception_guard
      - observe_audio_perception_once
      - render_audio_perception_snapshot_lines
  - path: pir_open_gate.py
    role: Bounded startup gate that retries only exact transient PIR GPIO busy overlaps during runtime handover
    exports:
      - PirOpenGateResult
      - PirOpenable
      - open_pir_monitor_with_busy_retry
  - path: respeaker_capture_gate.py
    role: Bounded startup gate that requires consecutive readable ReSpeaker capture probes before runtime startup clears error state
    exports:
      - ReadableFrameProbeSampler
      - require_stable_respeaker_capture
  - path: claim_metadata.py
    role: Shared `confidence` / `source` / `requires_confirmation` helpers for multimodal runtime claims
    exports:
      - RuntimeClaimMetadata
  - path: safety_trigger_fusion.py
    role: Runtime-only bridge that prefers short-window fused safety claims while preserving legacy engine cooldowns and fall-fallback behavior
    exports:
      - SafetyTriggerFusionBridge
  - path: ambiguous_room_guard.py
    role: Fail-closed room-ambiguity guard for person-targeted runtime inferences
    exports:
      - AmbiguousRoomGuardSnapshot
      - derive_ambiguous_room_guard
  - path: identity_fusion.py
    role: Bounded temporal/session identity fusion over voice, portrait, household-voice candidates, and visual-anchor history
    exports:
      - MultimodalIdentityFusionConfig
      - MultimodalIdentityFusionSnapshot
      - TemporalIdentityFusionTracker
  - path: portrait_match.py
    role: Conservative runtime claim surface for local portrait-match observations and temporal identity evidence
    exports:
      - PortraitMatchSnapshot
      - derive_portrait_match
  - path: known_user_hint.py
    role: Conservative known-user hint from voice-profile state plus optional temporal identity-fusion evidence and clear room context
    exports:
      - KnownUserHintSnapshot
      - derive_known_user_hint
  - path: affect_proxy.py
    role: Prompt-only affect proxy surface from coarse posture, attention, and quiet cues
    exports:
      - AffectProxySnapshot
      - derive_affect_proxy
  - path: smart_home_context.py
    role: Bounded layered runtime context tracker for local presence plus optional same-room and home-wide smart-home context
    exports:
      - HomeContextSnapshot
      - NearDevicePresenceSnapshot
      - RoomContextSnapshot
      - SmartHomeContextConfig
      - SmartHomeContextTracker
      - SmartHomeRuntimeContextSnapshot
      - SmartHomeRuntimeContextUpdate
  - path: person_state.py
    role: Aggregate the existing runtime claim surfaces into one stable per-axis person-state schema for downstream policy and inspection
    exports:
      - PersonStateAxisSnapshot
      - PersonStateSnapshot
      - derive_person_state
  - path: continuous_attention.py
    role: Bounded visible-person track matching, motion recency, and conservative speaker-target handoff for HDMI follow
    exports:
      - ContinuousAttentionTargetConfig
      - ContinuousAttentionTargetSnapshot
      - ContinuousAttentionTracker
  - path: attention_targeting.py
    role: Bounded multimodal attention-target prioritization for HDMI gaze-follow with continuous visible-person tracks and horizontal-only normal person-following
    exports:
      - MultimodalAttentionTargetConfig
      - MultimodalAttentionTargetSnapshot
      - MultimodalAttentionTargetTracker
  - path: attention_debug_stream.py
    role: Bounded JSONL tick stream for HDMI attention-refresh diagnostics and dropout forensics
    exports:
      - AttentionDebugStream
      - AttentionDebugStreamConfig
  - path: display_attention.py
    role: Conservative proactive producer and local refresh policy for HDMI gaze-follow face cues that mirror camera-space anchors into user-facing gaze, keep semantic up/down poses out of normal person-following, and renew or briefly hold matching cues before they expire or disappear on short camera dropouts
    exports:
      - DisplayAttentionCueDecision
      - DisplayAttentionCuePublishResult
      - DisplayAttentionCuePublisher
      - display_attention_refresh_supported
      - derive_display_attention_cue
      - resolve_display_attention_refresh_interval
  - path: display_debug_signals.py
    role: Bounded publisher for optional HDMI header debug pills derived from current camera facts plus brief event and trigger holds
    exports:
      - DisplayDebugSignalPublishResult
      - DisplayDebugSignalPublisher
  - path: display_gesture_emoji.py
    role: Conservative runtime producer that mirrors stabilized rising-edge user gestures into short-lived HDMI emoji acknowledgements without overwriting foreign emoji cues
    exports:
      - DisplayGestureEmojiDecision
      - DisplayGestureEmojiPublishResult
      - DisplayGestureEmojiPublisher
      - derive_display_gesture_emoji
      - display_gesture_refresh_supported
      - resolve_display_gesture_refresh_interval
  - path: display_reserve_candidates.py
    role: Compatibility wrapper that keeps the historic reserve-candidate loader stable while delegating real sourcing to the modular ambient companion flow
  - path: display_reserve_flow.py
    role: Shared ambient companion orchestration that blends personality, memory, reflection, latent snapshot-topic backfill, and long-horizon reserve-lane learning into one bounded semantic-topic pool, with a raw selected-card seam for eval harnesses before copy rewrite and deterministic card-surface expansion
    exports:
      - DisplayReserveCompanionFlow
      - DisplayReserveCompanionFlowContext
  - path: display_reserve_diversity.py
    role: Shared reserve-lane diversity policy that normalizes raw implementation-shaped sources into broader conversational seed families and axes, then selects a broader raw candidate subset for plan building and copy rewrite
    exports:
      - DEFAULT_DISPLAY_RESERVE_DIVERSITY_POLICY
      - DisplayReserveDiversityPolicy
      - DisplayReserveSeedProfile
      - display_reserve_seed_profile
      - reserve_seed_axis
      - reserve_seed_family
      - select_diverse_candidates
  - path: display_reserve_expansion.py
    role: Deterministic semantic-topic bundling and multi-angle right-lane card expansion that keeps concrete card ids separate from grouped semantic topic keys used by feedback, retirement, and learning
    exports:
      - DisplayReserveTopicBundle
      - bundle_display_reserve_candidates
      - expand_display_reserve_candidates
  - path: display_reserve_copy_contract.py
    role: Shared reserve-card copy assets that normalize candidate families and expose family-scoped gold examples plus the shared quality rubric for writer/judge prompts
    exports:
      - ReserveCopyExample
      - ReserveCopyRubricCriterion
      - reserve_copy_examples_for_family
      - reserve_copy_examples_payload
      - reserve_copy_rubric_payload
      - resolve_reserve_copy_family
  - path: display_reserve_learning.py
    role: Long-horizon reserve-lane learning profile derived from durable shown-card outcomes so future plans can reward welcome openers and cool repetitive ones generically
    exports:
      - DisplayReserveLearningProfile
      - DisplayReserveLearningProfileBuilder
      - DisplayReserveLearningSignal
  - path: display_reserve_memory.py
    role: Focused conversion of durable clarification conflicts and gentle follow-ups into reserve-lane candidate families, including semantic card_intent payloads for calm clarification and follow-up wording
    exports:
      - DisplayReserveMemoryCandidateSet
      - build_memory_conflict_candidate
      - build_memory_follow_up_candidate
      - load_display_reserve_memory_candidates
  - path: display_reserve_snapshot_topics.py
    role: Latent snapshot-topic reserve loader that backfills additional continuity, relationship, place, and concrete world-signal seeds from the persisted personality snapshot when stronger explicit loaders stay sparse
    exports:
      - load_display_reserve_snapshot_candidates
  - path: display_reserve_user_discovery.py
    role: Guided user-discovery reserve-candidate loader for start, resume, and short profile-review invites, including semantic card_intent payloads for reserve-card generation
    exports:
      - load_display_reserve_user_discovery_candidates
  - path: display_reserve_reflection.py
    role: Reflection-derived reserve-candidate loader for summaries and midterm packets that should inform the ambient lane without reflection-specific coupling elsewhere, including semantic card_intent payloads for calm callback/follow-up wording
    exports:
      - DisplayReserveReflectionConfig
      - load_display_reserve_reflection_candidates
  - path: display_reserve_world.py
    role: Direct world-intelligence reserve-candidate loader that turns active RSS subscriptions and condensed awareness threads into calm topic-breadth candidates for the right-hand lane, including semantic card_intent payloads for public-topic observation cards
    exports:
      - load_display_reserve_world_candidates
  - path: display_reserve_prompting.py
    role: Compact prompt-payload and anchor-shaping layer for reserve-card rewriting so the LLM sees explicit topical anchors, semantic card_intent hints, expansion angles, normalized copy families, shared quality rubric, and family-scoped gold examples instead of raw nested candidate payloads
    exports:
      - build_candidate_prompt_payload
      - build_generation_prompt
      - build_selection_prompt
  - path: display_reserve_generation.py
    role: Rewrite reserve-card wording through small bounded structured writer/judge batches without changing semantic-topic grouping or live publish cadence, using compact prompt payloads plus configurable batch, variant, and local deadline limits so slow calls and weak raw anchors do not dominate the right-lane UX, and expose bounded trace metadata for eval harnesses
    exports:
      - DisplayReserveCopyGenerator
      - DisplayReserveGenerationError
      - DisplayReserveGenerationTrace
  - path: display_reserve_companion_planner.py
    role: Explicit overnight reserve-lane planner that runs nightly reflection/world refresh, summarizes recent shown-card outcomes, and stores the prepared next-day plan for morning adoption
    exports:
      - DisplayReserveCompanionPlanner
      - DisplayReserveNightlyMaintenanceResult
      - DisplayReserveNightlyMaintenanceState
      - DisplayReserveNightlyMaintenanceStateStore
      - DisplayReserveNightlyOutcomeSummary
  - path: display_reserve_support.py
    role: Shared reserve-lane text, timestamp, and local-time normalization helpers reused by the planner and live publishers
    exports:
      - compact_text
      - default_local_now
      - format_timestamp
      - parse_local_time
      - parse_timestamp
      - utc_now
  - path: display_reserve_runtime.py
    role: Shared right-lane reserve publisher that all text-card producers reuse so cue persistence and exposure history stay on one common runtime path with concrete card ids plus grouped semantic topic keys
    exports:
      - DisplayReserveRuntimePublishResult
      - DisplayReserveRuntimePublisher
      - DisplayReserveRuntimeRequest
  - path: display_ambient_impulses.py
    role: Conservative live publisher that shows the next planned positive personality-driven HDMI reserve impulse only when quiet-hours, presence, runtime state, and surface ownership all allow it, adopting prepared next-day plans when morning rollover starts and otherwise delegating the actual reserve publish to the shared runtime path
    exports:
      - DisplayAmbientImpulsePublishResult
      - DisplayAmbientImpulsePublisher
  - path: display_social_reserve.py
    role: Route visual-first proactive social prompts into the same right-hand reserve lane and shared reserve publish path instead of the fullscreen presentation surface
    exports:
      - DisplaySocialReservePublishResult
      - DisplaySocialReservePublisher
  - path: display_reserve_day_plan.py
    role: Build and persist one calm current-day reserve rotation from expanded reserve card surfaces, including semantic-topic spacing, short-lived feedback-driven replanning, generic source-family spacing, and answer-based same-day retirement instead of one-shot card exhaustion
    exports:
      - DisplayReserveDayPlan
      - DisplayReserveDayPlanStore
      - DisplayReserveDayPlanner
      - DisplayReservePlannedItem
  - path: gesture_ack_lane.py
    role: Dedicated low-latency acknowledgement stabilizer for the explicit user-facing gesture symbol set
    exports:
      - GestureAckLane
  - path: gesture_wakeup_dispatcher.py
    role: Single-flight background dispatcher for accepted visual wakeup handlers
    exports:
      - GestureWakeupDispatcher
  - path: gesture_wakeup_lane.py
    role: Dedicated visual wakeup stabilizer for one configured fine-hand symbol such as peace-sign
    exports:
      - GestureWakeupDecision
      - GestureWakeupLane
  - path: gesture_debug_stream.py
    role: Bounded JSONL tick stream for HDMI gesture-refresh diagnostics and latency forensics
    exports:
      - GestureDebugStream
      - GestureDebugStreamConfig
  - path: runtime_contract.py
    role: Hard startup-blocker contract for XVF3800 DFU/safe-mode states
    exports:
      - ReSpeakerRuntimeContractError
      - ReSpeakerStartupContractAssessment
      - assess_respeaker_monitor_startup_contract
      - is_respeaker_runtime_hard_block
  - path: governor_inputs.py
    role: Focused packaging of current ReSpeaker presence/audio facts for proactive governor callers
    exports:
      - ReSpeakerGovernorInputs
      - build_respeaker_governor_inputs
  - path: multimodal_initiative.py
    role: Conservative multimodal initiative readiness and display-first recommendation from camera and ReSpeaker facts
    exports:
      - ReSpeakerMultimodalInitiativeSnapshot
      - derive_respeaker_multimodal_initiative
  - path: sensitive_behavior_gate.py
    role: Conservative gate for blocking sensitive proactive behavior on ambiguous multi-person or low-confidence audio context
    exports:
      - ReSpeakerSensitiveBehaviorGateDecision
      - evaluate_respeaker_sensitive_behavior_gate
  - path: speaker_association.py
    role: Conservative association of current speech to the single primary visible person anchor
    exports:
      - ReSpeakerSpeakerAssociationSnapshot
      - derive_respeaker_speaker_association
  - path: presence.py
    role: Activation presence-session controller and snapshot model
    exports:
      - PresenceSessionController
      - PresenceSessionSnapshot
  - path: service.py
    role: Compatibility shim that preserves the historic import path and helper surface while delegating the real implementation to service_impl/
    exports:
      - ProactiveCoordinator
      - ProactiveMonitorService
      - ProactiveTickResult
      - build_default_proactive_monitor
  - path: service_impl/README.md
    role: Internal map of the refactored proactive service implementation package; no caller migration required
  - path: service_impl/coordinator_core.py
    role: Dependency wiring plus the main proactive tick/orchestration path extracted from the legacy service monolith
    exports:
      - ProactiveTickResult
  - path: service_impl/coordinator_display.py
    role: Dedicated HDMI attention and gesture refresh workflows extracted from the legacy service monolith
  - path: service_impl/coordinator_observation.py
    role: Stable observation-mixin facade that composes the focused observation helper modules behind the historic path
  - path: service_impl/coordinator_observation_display.py
    role: Automation-dispatch, HDMI display, gesture, and camera-surface helper bridges extracted from the legacy observation mixin
  - path: service_impl/coordinator_observation_facts.py
    role: Automation fact payload assembly and rising-edge sensor-event derivation extracted from the legacy observation mixin
  - path: service_impl/coordinator.py
    role: Final ProactiveCoordinator composition built from focused mixins
    exports:
      - ProactiveCoordinator
      - ProactiveTickResult
  - path: service_impl/monitor.py
    role: Bounded background worker lifecycle wrapper around the proactive coordinator
    exports:
      - ProactiveMonitorService
  - path: service_impl/builder.py
    role: Default production monitor assembly path that keeps the legacy wrapper monkeypatch surface stable
    exports:
      - BuildDefaultProactiveMonitorDependencies
      - build_default_proactive_monitor
  - path: service_attention_helpers.py
    role: Focused HDMI attention-follow live-context export, servo follow, changed-only tracing, and attention-debug packaging used by the proactive coordinator
    exports:
      - attention_servo_source_is_authoritative
      - build_attention_servo_decision_ledger
      - publish_display_attention_live_context
      - record_attention_debug_tick
      - record_attention_follow_pipeline_if_changed
      - record_attention_servo_follow_if_changed
      - record_attention_servo_forensic_tick
      - record_display_attention_follow_if_changed
      - summarize_visible_persons
      - update_attention_servo_follow
      - update_display_attention_follow
      - update_display_debug_signals
  - path: service_gesture_helpers.py
    role: Focused HDMI gesture acknowledgement publish, accepted wakeup dispatch, and gesture-debug trace packaging used by the proactive coordinator
    exports:
      - dispatch_gesture_wakeup_with_fresh_context
      - gesture_observation_trace_details
      - handle_gesture_wakeup_decision
      - prime_gesture_wakeup_sensor_context
      - publish_display_gesture_decision
      - record_gesture_debug_tick
      - run_gesture_wakeup_handler
      - trace_gesture_ack_lane_decision
      - trace_gesture_publish_decision
      - trace_gesture_wakeup_lane_decision
