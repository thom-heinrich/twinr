schema_version: 1
name: hardware
path: src/twinr/hardware
kind: python-package
visibility: internal
summary: Provide bounded audio, GPIO, servo, camera, printer, voice-profile, and local household-identity adapters for Twinr runtime paths.
owned_concerns:
  - Capture and play bounded audio for conversation, ambient sensing, and activation flows
  - Lift under-driven PCM16 activation-ack playback before it reaches the Pi speaker path so mixer-maxed devices still answer audibly
  - Prove bounded readable-frame microphone capture before runtime layers trust a targeted input path as voice-ready
  - Wait a short bounded window for transient XVF3800 USB/ALSA re-enumeration to clear before live capture paths fail a turn
  - Keep ALSA child-process env independent from borrowed Wayland/user-session sockets when the Pi runtime runs under a different UID than the visible desktop session
  - Monitor GPIO buttons and PIR motion across supported Pi backends
  - Drive one bounded body-orientation servo from an already-derived normalized attention target, including calibrated center/invert controls, soft end-stop margins, calm idle release near neutral, and a dedicated open-loop continuous-rotation mode with bounded virtual-heading estimation for 360-degree servos
  - Capture still photos via ffmpeg-backed V4L2 integration, with a bounded Pi libcamera fallback for busy unicam-image nodes or a bounded peer-Pi HTTP snapshot proxy when the main host has no local still camera
  - Persist local portrait identities with multiple reference images per user
  - Perform bounded local portrait matching against enrolled identities using still-camera captures, on-device embeddings, and temporal evidence fusion
  - Persist and assess multi-user local household voice identities on device
  - Coordinate a bounded local household identity manager across portrait matching, voice matching, explicit feedback, and short session history
  - Run bounded hybrid IMX500 + MediaPipe health, multi-person visibility, person/object gating, pose enrichment, hand-landmark ROI work, temporal coarse-arm, and stable full-frame fine-hand gesture inference
  - Honor recognizer negative classes such as `none` when resolving user-facing fine-hand symbols so weak custom-model positives do not leak through as false gestures
  - Supplement zero/one-person SSD frames with bounded local YuNet face anchors so multi-person attention can still recover visible speakers in seated table scenes
  - Format and submit bounded receipt print jobs
  - Probe ReSpeaker XVF3800 USB/ALSA readiness and capture typed host-control primitives
  - Derive conservative XVF3800 runtime facts such as direction confidence, overlap, mute state, and busy-state interruption hints
  - Keep expensive XVF3800 host-control polling on an activity-aware schedule so idle Pi loops reuse recent signal snapshots instead of re-reading USB control state every tick
  - Resolve one calm XVF3800 indicator contract and drive bounded runtime-owned ring feedback for waiting, listening, thinking, speaking, and error states
  - Derive conservative XVF3800 non-speech and background-media suppression facts from bounded ambient capture
  - Persist and assess local on-device voice profiles
out_of_scope:
  - Hardware-loop orchestration in src/twinr/agent/workflows
  - Display rendering and e-paper control in src/twinr/display
  - OS/bootstrap setup scripts under hardware/
  - Provider STT/TTS/model logic above raw device I/O
files:
  - path: __init__.py
    role: Narrow package export surface for camera, PIR, and voice profile helpers
    exports:
      - CapturedPhoto
      - GpioPirMonitor
      - PirBinding
      - PirMotionEvent
      - V4L2StillCamera
      - VoiceAssessment
      - VoiceProfileMonitor
      - VoiceProfileStore
      - VoiceProfileSummary
      - VoiceProfileTemplate
      - build_pir_binding
      - configured_pir_monitor
      - voice_profile_store_path
  - path: audio.py
    role: Bounded microphone capture, readable-frame probing, ambient sampling, and playback helpers
    exports:
      - AmbientAudioCaptureWindow
      - AmbientAudioLevelSample
      - AudioCaptureReadinessError
      - AudioCaptureReadinessProbe
      - SpeechCaptureResult
      - SilenceDetectedRecorder
      - AmbientAudioSampler
      - WaveAudioPlayer
      - pcm16_to_wav_bytes
      - resolve_dynamic_pause_thresholds
      - resolve_pause_resume_confirmation
  - path: audio_env.py
    role: Sanitize ALSA child-process env so root-run Pi audio helpers do not inherit mismatched Wayland or Pulse session sockets
    exports:
      - build_audio_subprocess_env
      - runtime_dir_owner_uid
  - path: respeaker_capture_recovery.py
    role: Bound transient XVF3800 capture recovery so live listen paths only wait briefly for real USB/ALSA re-enumeration before failing
    exports:
      - wait_for_transient_respeaker_capture_ready
  - path: ai_camera.py
    role: Stable compatibility facade for the public local AI-camera adapter surface, including bounded multi-person visibility observations
    exports:
      - AICameraAdapterConfig
      - AICameraBodyPose
      - AICameraBox
      - AICameraFineHandGesture
      - AICameraGestureEvent
      - AICameraMotionState
      - AICameraObjectDetection
      - AICameraObservation
      - AICameraZone
      - LocalAICameraAdapter
  - path: camera_ai/
    role: Internal SoC package for AI-camera contracts, IMX500 runtime, MediaPipe runtime, supplemental face anchors, pose, motion, and gesture modules
  - path: ai_camera_diagnostics.py
    role: Bounded diagnostics for IMX500 pose candidate selection and keypoint support on the Pi
    exports:
      - AICameraPoseCandidateDiagnostic
      - AICameraPoseProbeDiagnostic
      - AICameraPoseSupportDiagnostic
      - capture_pose_probe
      - capture_pose_probe_sequence
  - path: hand_landmarks.py
    role: Bounded MediaPipe hand-landmark ROI worker for the Pi-side camera path
    exports:
      - DEFAULT_MEDIAPIPE_HAND_LANDMARKER_MODEL_URL
      - HandLandmarkDetection
      - HandLandmarkPoint
      - HandLandmarkResult
      - HandLandmarkWorkerConfig
      - HandRoiSource
      - MediaPipeHandLandmarkWorker
  - path: mediapipe_vision.py
    role: Stable compatibility facade for the public MediaPipe camera pipeline surface
    exports:
      - DEFAULT_MEDIAPIPE_GESTURE_MODEL_URL
      - DEFAULT_MEDIAPIPE_HAND_LANDMARKER_MODEL_URL
      - DEFAULT_MEDIAPIPE_POSE_MODEL_URL
      - MediaPipeVisionConfig
      - MediaPipeVisionPipeline
      - MediaPipeVisionResult
      - TemporalPoseGestureClassifier
  - path: buttons.py
    role: GPIO button monitoring across libgpiod and CLI fallbacks
    exports:
      - ButtonAction
      - ButtonBinding
      - ButtonEvent
      - GpioButtonMonitor
      - build_button_bindings
      - build_probe_bindings
      - configured_button_monitor
      - edge_name
      - edge_to_action
  - path: servo_follow.py
    role: Bounded servo pulse adapter for normalized body-orientation follow, with calibrated soft limits, calm idle release, continuous-rotation control-mode selection, and driver selection across Pi GPIO and focused external writers
    exports:
      - AttentionServoConfig
      - AttentionServoController
      - AttentionServoDecision
      - LGPIOServoPulseWriter
  - path: servo_continuous.py
    role: Focused virtual-heading planner for continuous-rotation servos so open-loop speed control stays separate from the higher follow-state machine
  - path: servo_maestro.py
    role: Focused Pololu Mini Maestro command-port adapter for bounded USB serial servo output, stale-path recovery, ttyACM fallback discovery, and command-port auto-baud initialization
  - path: camera.py
    role: still camera adapter with bounded ffmpeg/V4L2 capture, Pi rpicam fallback, optional peer-Pi HTTP snapshot fetches, and bounded persistence
    exports:
      - CameraError
      - CameraConfigurationError
      - CameraCaptureTimeoutError
      - CameraCaptureFailedError
      - CapturedPhoto
      - V4L2StillCamera
  - path: portrait_identity.py
    role: Atomic local portrait identity store with enrolled reference-image management and embedded templates
    exports:
      - PortraitIdentityProfile
      - PortraitIdentityStore
      - PortraitIdentitySummary
      - PortraitReferenceImage
      - portrait_identity_image_dir
      - portrait_identity_store_path
  - path: portrait_match.py
    role: Bounded local portrait-match adapter with enrollment flow, multi-reference scoring, and temporal fusion
    exports:
      - OpenCVPortraitEmbeddingBackend
      - PortraitEnrollmentResult
      - PortraitEmbeddingResult
      - PortraitMatchConfig
      - PortraitMatchObservation
      - PortraitMatchProvider
  - path: household_voice_identity.py
    role: Multi-user local household voice identity store and matcher
    exports:
      - HouseholdVoiceAssessment
      - HouseholdVoiceIdentityMonitor
      - HouseholdVoiceIdentityStore
      - HouseholdVoiceProfile
      - HouseholdVoiceSummary
  - path: household_identity.py
    role: Shared local household identity manager over portrait, voice, feedback, and bounded session history
    exports:
      - HouseholdIdentityFeedbackEvent
      - HouseholdIdentityFeedbackStore
      - HouseholdIdentityManager
      - HouseholdIdentityMemberStatus
      - HouseholdIdentityObservation
      - HouseholdIdentityQuality
      - HouseholdIdentityStatus
  - path: pir.py
    role: PIR motion adapter layered on the button monitor backend
    exports:
      - PirMonitorError
      - PirBinding
      - PirMotionEvent
      - GpioPirMonitor
      - build_pir_binding
      - configured_pir_monitor
  - path: printer.py
    role: Receipt formatting and CUPS submission adapter
    exports:
      - PrinterError
      - RawReceiptPrinter
  - path: respeaker/__init__.py
    role: Stable package export surface for XVF3800 probe and primitive helpers
    exports:
      - AEC_AZIMUTH_VALUES_PARAMETER
      - AEC_SPENERGY_VALUES_PARAMETER
      - AUDIO_MGR_SELECTED_AZIMUTHS_PARAMETER
      - DEFAULT_RESPEAKER_PARAMETER_SPECS
      - DOA_VALUE_PARAMETER
      - LED_COLOR_PARAMETER
      - LED_EFFECT_PARAMETER
      - GPO_READ_VALUES_PARAMETER
      - VERSION_PARAMETER
      - ReSpeakerClaimMetadata
      - ReSpeakerDerivedSignalState
      - ReSpeakerCaptureDevice
      - ReSpeakerLedController
      - ReSpeakerLedLoop
      - ReSpeakerLedProfile
      - ReSpeakerIndicatorState
      - ReSpeakerMemoryClass
      - ReSpeakerDirectionSnapshot
      - ReSpeakerLibusbTransport
      - ReSpeakerMuteSnapshot
      - ReSpeakerParameterRead
      - ReSpeakerParameterSpec
      - ReSpeakerParameterType
      - ReSpeakerPrimitiveSnapshot
      - ReSpeakerProbeResult
      - ReSpeakerSignalProvider
      - ReSpeakerSignalSnapshot
      - ReSpeakerSchedulingContext
      - ReSpeakerTransportAvailability
      - ReSpeakerUsbDevice
      - ScheduledReSpeakerSignalProvider
      - build_respeaker_claim_payloads
      - build_respeaker_signal_claim_contract
      - capture_respeaker_primitive_snapshot
      - claim_contract_to_payload
      - config_targets_respeaker
      - derive_respeaker_signal_state
      - optional_respeaker_led_companion
      - probe_respeaker_xvf3800
      - read_default_respeaker_parameters
      - resolve_respeaker_led_profile
      - resolve_respeaker_indicator_state
  - path: respeaker/claim_contract.py
    role: Build and serialize per-claim XVF3800 provenance/confidence metadata
  - path: respeaker/ambient_classification.py
    role: Conservative non-speech and background-media classification from bounded ambient capture plus XVF3800 speech facts
  - path: respeaker/companion.py
    role: Optional Pi-runtime background companion for the XVF3800 LED loop
    exports:
      - optional_respeaker_led_companion
  - path: respeaker/indicator_policy.py
    role: Shared calm XVF3800 ring/indicator semantics for listening, mute, and unavailable states
  - path: respeaker/led_profiles.py
    role: Calm runtime-state-to-color pulse profiles for the XVF3800 ring
    exports:
      - ReSpeakerLedProfile
      - resolve_respeaker_led_profile
  - path: respeaker/led_controller.py
    role: Bounded XVF3800 LED writes with deduped effect/color updates
    exports:
      - ReSpeakerLedController
  - path: respeaker/led_loop.py
    role: Snapshot-driven runtime LED loop that keeps the XVF3800 ring aligned with Twinr status
    exports:
      - ReSpeakerLedLoop
  - path: respeaker/derived_signals.py
    role: Conservative XVF3800 signal interpretation helpers for direction, overlap, and busy-state interruption facts
  - path: respeaker/models.py
    role: Typed XVF3800 probe, host-control, and primitive snapshot models
  - path: respeaker/probe.py
    role: ReSpeaker XVF3800 USB and ALSA capture-readiness probe helpers
  - path: respeaker/raw_reads.py
    role: Official XVF3800 primitive parameter specs and bounded raw-read batch
  - path: respeaker/snapshot_service.py
    role: Typed XVF3800 primitive snapshot capture and interpretation
  - path: respeaker/signal_provider.py
    role: Runtime-facing XVF3800 signal adapter with recent-speech tracking
  - path: respeaker/scheduled_provider.py
    role: Activity-aware XVF3800 polling wrapper that caches heavy host-control snapshots between active refresh windows
  - path: respeaker/transport.py
    role: Dependency-light libusb host-control transport for XVF3800 reads and bounded LED writes
    exports:
      - ReSpeakerLibusbTransport
  - path: respeaker/write_specs.py
    role: Official bounded XVF3800 write specs used by Twinr LED control
    exports:
      - LED_COLOR_PARAMETER
      - LED_EFFECT_PARAMETER
  - path: voice_profile.py
    role: Local voice profile store, enrollment, and assessment helpers
    exports:
      - VoiceAssessment
      - VoiceProfileMonitor
      - VoiceProfileStore
      - VoiceProfileSummary
      - VoiceProfileTemplate
      - extract_voice_embedding_from_pcm16
      - extract_voice_embedding_from_wav_bytes
      - voice_embedding_confidence
      - voice_profile_store_path
public_api:
  module: twinr.hardware
  exports:
    - CapturedPhoto
    - GpioPirMonitor
    - PirBinding
    - PirMotionEvent
    - V4L2StillCamera
    - VoiceAssessment
    - VoiceProfileMonitor
    - VoiceProfileStore
    - VoiceProfileSummary
    - VoiceProfileTemplate
    - build_pir_binding
    - configured_pir_monitor
    - voice_profile_store_path
