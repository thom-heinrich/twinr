schema_version: 1
name: orchestrator
path: src/twinr/orchestrator
kind: python-package
visibility: internal
summary: Expose Twinr's provider-neutral websocket orchestrator surface for remote turns, streaming voice sessions, ack events, and remote tool bridging.
owned_concerns:
  - Define websocket transport contracts for turn requests, ack events, tool exchange, text deltas, and turn completion
  - Expose the websocket client, FastAPI server, and local session bridge used by edge-orchestrator deployments
  - Correlate remote tool calls and results while keeping fast ack phrases mapped to stable transport IDs
  - Define bounded streaming voice contracts for edge audio frames, runtime-state updates, wake confirmations, same-stream transcript commits, follow-up windows, and barge-in interrupts
  - Carry the runtime-owned temporary voice-quiet deadline through the voice contracts and fail closed for idle wake/follow-up while that bounded quiet window is active
  - Host the server-side voice session that evaluates activation candidates and emits same-stream transcript or barge-in decisions
  - Adapt the thh1986 remote ASR HTTP service into bounded transcript calls for the server-side voice session
  - Host the embedded `/v1/transcribe` HTTP surface when the remote-ASR URL points back to the local orchestrator server
out_of_scope:
  - Tool prompt authoring, schema construction, or concrete tool-side business logic in src/twinr/agent/tools
  - Runtime loop selection or CLI orchestration in src/twinr/__main__.py and src/twinr/agent/workflows
  - Provider-specific model, search, or transport implementations in src/twinr/providers/openai
files:
  - path: __init__.py
    role: Stable package export surface
    exports:
      - ACK_ID_TO_TEXT
      - EdgeOrchestratorServer
      - EdgeOrchestratorSession
      - EdgeOrchestratorVoiceSession
      - OrchestratorAckEvent
      - OrchestratorClientTurnResult
      - OrchestratorToolRequest
      - OrchestratorToolResponse
      - OrchestratorTurnCompleteEvent
      - OrchestratorTurnRequest
      - OrchestratorVoiceAudioFrame
      - OrchestratorVoiceBargeInInterruptEvent
      - OrchestratorVoiceErrorEvent
      - OrchestratorVoiceFollowUpClosedEvent
      - OrchestratorVoiceHelloRequest
      - OrchestratorVoiceReadyEvent
      - OrchestratorVoiceRuntimeStateEvent
      - OrchestratorVoiceTranscriptCommittedEvent
      - OrchestratorVoiceWakeConfirmedEvent
      - OrchestratorVoiceWebSocketClient
      - OrchestratorWebSocketClient
      - RemoteToolBridge
      - ack_id_for_text
      - ack_text_for_id
      - create_app
      - decode_voice_server_event
  - path: acks.py
    role: Canonical ack ID and text mapping
    exports:
      - ACK_ID_TO_TEXT
      - ack_id_for_text
      - ack_text_for_id
  - path: contracts.py
    role: Websocket message dataclasses and payload coercion
    exports:
      - OrchestratorAckEvent
      - OrchestratorClientTurnResult
      - OrchestratorErrorEvent
      - OrchestratorTextDeltaEvent
      - OrchestratorToolRequest
      - OrchestratorToolResponse
      - OrchestratorTurnCompleteEvent
      - OrchestratorTurnRequest
  - path: client.py
    role: Blocking and asyncio-safe websocket client
    exports:
      - OrchestratorWebSocketClient
  - path: voice_contracts.py
    role: Streaming voice websocket dataclasses and payload coercion
    exports:
      - OrchestratorVoiceAudioFrame
      - OrchestratorVoiceBargeInInterruptEvent
      - OrchestratorVoiceErrorEvent
      - OrchestratorVoiceFollowUpClosedEvent
      - OrchestratorVoiceHelloRequest
      - OrchestratorVoiceReadyEvent
      - OrchestratorVoiceRuntimeStateEvent
      - OrchestratorVoiceTranscriptCommittedEvent
      - OrchestratorVoiceWakeConfirmedEvent
      - VoiceServerEvent
      - decode_voice_server_event
  - path: voice_client.py
    role: Blocking websocket client for streaming edge-audio sessions
    exports:
      - OrchestratorVoiceWebSocketClient
  - path: server.py
    role: FastAPI websocket server and transport gatekeeping for turn and streaming voice sessions
    exports:
      - EdgeOrchestratorServer
      - create_app
  - path: session.py
    role: Local tool-loop bridge and remote tool correlation
    exports:
      - EdgeOrchestratorSession
      - RemoteToolBridge
  - path: remote_asr.py
    role: Bounded HTTP client for the thh1986 remote ASR service used by the voice session
    exports:
      - RemoteAsrBackendAdapter
      - RemoteAsrServiceError
      - RemoteAsrTranscript
  - path: remote_asr_service.py
    role: Embedded remote-ASR HTTP surface for colocated orchestrator deployments
    exports:
      - RemoteAsrHttpService
      - remote_asr_url_targets_local_orchestrator
  - path: voice_activation.py
    role: Transcript-first wake phrase matching and continuation extraction
    exports:
      - DEFAULT_VOICE_ACTIVATION_PHRASES
      - VoiceActivationMatch
      - VoiceActivationPhraseMatcher
      - VoiceActivationTailExtractor
      - match_voice_activation_transcript
      - normalize_activation_detector_label
      - phrase_from_activation_detector_label
      - voice_activation_primary_prompt
  - path: voice_gateway_guardrails.py
    role: Fail-closed startup checks for the remote-only live voice gateway contract
    exports:
      - assert_transcript_first_voice_gateway_contract
  - path: voice_runtime_intent.py
    role: Compact person-state projection and multimodal audio-bias policy
    exports:
      - VoiceRuntimeIntentContext
  - path: voice_forensics.py
    role: Bounded voice-frame telemetry shared by edge and host-side voice paths
    exports:
      - VoiceFrameTelemetryBucket
      - prefixed_signal_profile_details
  - path: voice_audio_debug_store.py
    role: Opt-in rolling WAV artifact store for forensic-only voice debugging
    exports:
      - VoiceAudioDebugArtifactStore
      - VoiceAudioDebugArtifactStoreConfig
  - path: voice_transcript_debug_stream.py
    role: Bounded JSONL storage for raw transcript-first gateway decisions
    exports:
      - VoiceTranscriptDebugStream
      - VoiceTranscriptDebugStreamConfig
  - path: voice_session.py
    role: Server-side activation, follow-up, and barge-in decision session for streaming edge audio
    exports:
      - EdgeOrchestratorVoiceSession
public_api:
  module: twinr.orchestrator
  exports:
    - ACK_ID_TO_TEXT
    - EdgeOrchestratorServer
    - EdgeOrchestratorSession
    - EdgeOrchestratorVoiceSession
    - OrchestratorAckEvent
    - OrchestratorClientTurnResult
    - OrchestratorToolRequest
    - OrchestratorToolResponse
    - OrchestratorTurnCompleteEvent
    - OrchestratorTurnRequest
    - OrchestratorVoiceAudioFrame
    - OrchestratorVoiceBargeInInterruptEvent
    - OrchestratorVoiceErrorEvent
    - OrchestratorVoiceFollowUpClosedEvent
    - OrchestratorVoiceHelloRequest
    - OrchestratorVoiceReadyEvent
    - OrchestratorVoiceRuntimeStateEvent
    - OrchestratorVoiceTranscriptCommittedEvent
    - OrchestratorVoiceWakeConfirmedEvent
    - OrchestratorVoiceWebSocketClient
    - OrchestratorWebSocketClient
    - RemoteToolBridge
    - ack_id_for_text
    - ack_text_for_id
    - create_app
    - decode_voice_server_event
primary_callers:
  - path: src/twinr/__main__.py
  - path: src/twinr/agent/base_agent/config.py
  - path: src/twinr/agent/workflows/realtime_runner.py
  - path: src/twinr/agent/workflows/voice_orchestrator.py
tests:
  - path: test/test_orchestrator.py
  - path: test/test_orchestrator_gateway_policy.py
  - path: test/test_realtime_runner.py
  - path: test/test_voice_orchestrator.py
