schema_version: 1
name: display
path: src/twinr/display
kind: python-package
visibility: internal
summary: Render Twinr runtime state on the configured Twinr display backend and optionally keep the display loop running beside other hardware loops.
owned_concerns:
  - Translate runtime snapshots and health signals into bounded status frames for the active display backend
  - Derive calm operator-visible ReSpeaker HCI state from authoritative ops events instead of embedding raw proactive-event parsing in the display loop
  - Surface calm ReSpeaker listening, heard-speech, direction-hint, and ring-semantic states without mirroring weak audio evidence
  - Persist and load optional HDMI face-expression cues so external triggers can steer gaze, brows, mouth, and subtle head drift without changing the generic runtime snapshot schema
  - Expose a producer-facing HDMI face-expression API so camera, proactive, or other runtime modules can set combinable gaze, brow, mouth, and blink cues without writing raw JSON
  - Persist and load optional HDMI presentation cues so capabilities can expand the right-hand panel into a fullscreen image or rich card without changing the generic runtime snapshot schema
  - Resolve prioritized HDMI presentation cards into a calm scene graph with eased morph stages and default face-sync reactions
  - Schedule rare idle-only HDMI ambient moments so the waiting face can occasionally show a small cute surprise without disrupting the status panel
  - Fetch, cache, and rotate optional RSS or Atom headlines for the HDMI bottom ticker without blocking the display loop on remote network I/O
  - Run bounded HDMI visual QC scene sets that capture screenshots, diff metrics, and report-ready artifacts for the visible monitor surface
  - Compose operator-friendly layout variants such as the grouped debug log display
  - Derive bounded debug-log sections from persisted ops events, usage telemetry, host health, and the remote-memory watchdog artifact without poll-to-poll timer churn or raw high-frequency metric jitter
  - Render a visible full-screen HDMI Wayland UI for the Pi monitor path and keep a framebuffer fallback for non-Wayland setups
  - Keep native Wayland surface hosting separate from framebuffer rendering so richer HDMI-only content surfaces can evolve without polluting the generic renderer
  - Validate and load the configured Waveshare vendor driver with Twinr GPIO and SPI expectations
  - Persist authoritative display forward-progress heartbeats so ops health and supervision can detect hung companion threads
  - Manage the optional companion display loop that shadows other runtime loops
out_of_scope:
  - Runtime snapshot persistence, health collection, or loop-lock implementations
  - Hardware bootstrap and vendor installation scripts under hardware/display
  - CLI argument parsing for top-level Twinr commands
files:
  - path: __init__.py
    role: Public display package export surface
    exports:
      - DisplayFaceBrowStyle
      - DisplayFaceCue
      - DisplayFaceCueStore
      - DisplayFaceEmotion
      - DisplayFaceExpression
      - DisplayFaceExpressionController
      - DisplayFaceGazeDirection
      - DisplayFaceMouthStyle
      - DisplayPresentationCardCue
      - DisplayPresentationController
      - DisplayPresentationCue
      - DisplayPresentationStore
      - HdmiFramebufferDisplay
      - HdmiWaylandDisplay
      - TwinrStatusDisplayLoop
      - WaveshareEPD4In2V2
      - create_display_adapter
  - path: contracts.py
    role: Shared adapter and payload contracts for display backends
  - path: factory.py
    role: Select the configured display backend
    exports:
      - create_display_adapter
  - path: service.py
    role: Snapshot-driven status loop orchestration across display backends
    exports:
      - TwinrStatusDisplayLoop
  - path: debug_log.py
    role: Group recent system, llm, hardware, and ChonkyDB watchdog telemetry into display-safe log sections
  - path: respeaker_hci.py
    role: Parse authoritative ReSpeaker ops events into calm status-card and debug-log HCI states, including listening/heard-speech/direction and ring semantics
  - path: face_cues.py
    role: Persist and normalize optional external HDMI face-expression cues
  - path: face_expressions.py
    role: Provide a producer-facing API for combinable HDMI gaze, brow, mouth, and blink expressions
    exports:
      - DisplayFaceBrowStyle
      - DisplayFaceEmotion
      - DisplayFaceExpression
      - DisplayFaceExpressionController
      - DisplayFaceGazeDirection
      - DisplayFaceMouthStyle
  - path: news_ticker.py
    role: Fetch, cache, and rotate bounded RSS or Atom headlines for the HDMI bottom ticker
  - path: presentation_cues.py
    role: Persist and normalize optional fullscreen HDMI presentation cues and expose producer-facing single-card and scene-card controllers
    exports:
      - DisplayPresentationCardCue
      - DisplayPresentationController
      - DisplayPresentationCue
      - DisplayPresentationStore
  - path: heartbeat.py
    role: Persist display forward-progress heartbeats and expose the shared companion-health contract for ops health and supervision
  - path: hdmi_ambient_moments.py
    role: Resolve deterministic rare idle-only HDMI ambient moments and their temporary face cues
  - path: hdmi_default_scene.py
    role: Compose the modular senior-facing HDMI default scene, including layout, face animation, and status cards
  - path: hdmi_presentation_graph.py
    role: Resolve prioritized HDMI presentation cards into eased graph nodes and face-sync defaults
  - path: visual_qc.py
    role: Drive bounded HDMI visual-QC scenes, capture screenshots, compute diffs, and build report-ready artifacts
  - path: hdmi_wayland.py
    role: Visible fullscreen HDMI Wayland adapter
    exports:
      - HdmiWaylandDisplay
  - path: wayland_surface_host.py
    role: Own the native fullscreen Wayland/Qt surface separately from rendering logic
  - path: hdmi_fbdev.py
    role: HDMI framebuffer fallback adapter and scene host/transport utilities
    exports:
      - HdmiFramebufferDisplay
  - path: wayland_env.py
    role: Resolve and export Wayland socket/runtime details for HDMI fullscreen output
  - path: layouts.py
    role: Status-card layout composition for default and debug display variants
  - path: waveshare_v2.py
    role: Waveshare panel adapter, rendering, and driver loading
    exports:
      - WaveshareEPD4In2V2
  - path: companion.py
    role: Optional sidecar thread for the display loop
    exports:
      - optional_display_companion
primary_callers:
  - path: src/twinr/__main__.py
  - path: hardware/display/display_test.py
  - path: hardware/display/run_display_loop.py
  - path: hardware/display/run_visual_qc.py
tests:
  - path: test/test_display.py
  - path: test/test_display_ambient_moments.py
  - path: test/test_display_debug_log.py
  - path: test/test_display_face_cues.py
  - path: test/test_display_news_ticker.py
  - path: test/test_display_presentation_cues.py
  - path: test/test_display_respeaker_hci.py
  - path: test/test_display_service.py
  - path: test/test_display_visual_qc.py
  - path: test/test_display_companion.py
  - path: test/test_main.py
