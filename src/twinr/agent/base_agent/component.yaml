schema_version: 1
name: base_agent
path: src/twinr/agent/base_agent
kind: python-package
visibility: internal
summary: Canonical base-agent package surface for config, contracts, and focused subpackages.
owned_concerns:
  - Expose the canonical import surface for base-agent config, runtime, state, prompting, and conversation helpers
  - Define the immutable environment-backed TwinrConfig dataclass and env-loading path, including bounded HDMI attention-refresh cadence, session-focus hold tuning for gaze-follow, and smart-home background-worker limits
  - Define provider/runtime protocols, tool-call value objects, and composite provider helpers
out_of_scope:
  - Workflow loops and hardware/audio orchestration in src/twinr/agent/workflows
  - Provider transport implementations in src/twinr/providers
  - Reminder, automation, context-store, and long-term-memory implementations outside imported types
  - Operator web UI and settings forms in src/twinr/web
files:
  - path: __init__.py
    role: Lazy root export surface
    exports:
      - TwinrConfig
      - ProviderBundle
      - CompositeSpeechAgentProvider
      - TwinrRuntime
      - TwinrStateMachine
      - RuntimeSnapshot
      - load_personality_instructions
      - merge_instructions
  - path: config.py
    role: Stable compatibility facade for the canonical environment-backed runtime configuration
    exports:
      - TwinrConfig
  - path: _config/__init__.py
    role: Internal runtime-config package boundary
  - path: _config/schema.py
    role: Immutable TwinrConfig dataclass shape plus delegated helper properties
  - path: _config/loading.py
    role: Canonical dotenv and process-environment loading flow for TwinrConfig
  - path: _config/context.py
    role: Shared dotenv/process-env context and derived config-loading values
  - path: _config/load_providers.py
    role: Provider and model-specific env loading
  - path: _config/load_turn_streaming.py
    role: Turn-control, streaming, audio, and search env loading
  - path: _config/load_channels.py
    role: Orchestrator, voice-gateway, and WhatsApp env loading
  - path: _config/load_vision_proactive.py
    role: Camera, proactive-sensing, portrait, and drone env loading
  - path: _config/load_runtime_memory.py
    role: Runtime-state, memory, automation, and smart-home env loading
  - path: _config/load_hardware_display.py
    role: GPIO, display, printer, and attention-servo env loading
  - path: _config/normalization.py
    role: Post-init normalization and validation orchestration for bounded config values
  - path: _config/normalization_updates.py
    role: Grouped frozen-dataclass update helpers for normalized config values
  - path: _config/parsing.py
    role: Primitive config parsing helpers kept independent from env loading and the dataclass
  - path: _config/constants.py
    role: Shared config constants and default value anchors
  - path: contracts.py
    role: Provider/runtime protocols and composite provider glue
    exports:
      - AgentToolCall
      - AgentToolResult
      - ToolCallingTurnResponse
      - SupervisorDecision
      - FirstWordReply
      - StreamingTranscriptionResult
      - StreamingSpeechEndpointEvent
      - ProviderBundle
      - CompositeSpeechAgentProvider
      - CombinedSpeechAgentProvider
subpackages:
  - path: _config
    role: Internal runtime-config package split by schema, parsing, loading, and normalization domains
  - path: conversation
    role: Conversation micro-policies and turn-boundary helpers
  - path: prompting
    role: Hidden instruction and personality assembly
  - path: runtime
    role: TwinrRuntime composition and lifecycle mixins
  - path: settings
    role: Bounded runtime-adjustable settings helpers
  - path: state
    role: State-machine and runtime snapshot primitives
reexports_from_other_packages:
  - path: __init__.py
    names:
      - LongTermMemoryService
      - ManagedContextEntry
      - ManagedContextFileStore
      - PersistentMemoryEntry
      - PersistentMemoryMarkdownStore
      - PromptContextStore
      - ReminderEntry
      - ReminderStore
tests:
  - path: test/test_config.py
  - path: test/test_config_refactor_parity.py
  - path: test/test_personality.py
  - path: test/test_adaptive_timing.py
  - path: test/test_turn_controller.py
  - path: test/test_conversation_closure.py
  - path: test/test_runtime_context.py
  - path: test/test_state_machine.py
  - path: test/test_audio.py
  - path: test/test_openai_backend.py
  - path: test/test_openai_realtime.py
