schema_version: 1
name: schemas
path: src/twinr/agent/tools/schemas
kind: python-package
visibility: internal
summary: Build canonical, compact, and realtime-safe tool schemas for Twinr agent tool calls.
owned_concerns:
  - Define the canonical tool schema surface and shared schema-property helpers
  - Keep the public contracts.py import path stable while the implementation stays modular under contracts_impl/
  - Normalize requested tool names before schema selection
  - Derive compact schema variants for token-constrained callers
  - Derive realtime-safe schema variants for provider APIs with stricter top-level limits
  - Keep the guided user-discovery schema aligned with semantic start/continue intents, review, correction, deletion, and structured memory-routing contracts
  - Keep smart-home discovery, filtered-state, control, aggregation, and stream schemas aligned with the generic integration contracts
  - Keep browser-automation schema descriptions aligned with the policy that generic web research stays on search_live_info and deeper site checks require explicit site intent or user-approved follow-up
  - Keep the bounded external service-connect schema aligned with spoken pairing requests and the right-info-panel QR/status contract
  - Keep the bounded WhatsApp-send schema aligned with remembered-contact lookup, explicit final confirmation, and phone-suffix clarification
  - Keep the temporary voice-quiet schema aligned with bounded stay-quiet requests that suppress transcript-first wake without becoming a persistent setting
out_of_scope:
  - Tool handler execution or runtime-side side effects
  - Prompt instruction authoring or tool selection policy
  - Workflow orchestration or provider session management beyond schema serialization
files:
  - path: __init__.py
    role: Package export surface for schema builders
    exports:
      - build_agent_tool_schemas
      - build_compact_agent_tool_schemas
      - build_realtime_tool_schemas
  - path: contracts.py
    role: Stable compatibility wrapper that preserves the public builder import path
    exports:
      - build_agent_tool_schemas
      - build_compact_agent_tool_schemas
      - build_realtime_tool_schemas
  - path: contracts_impl/main.py
    role: Canonical schema builder orchestration across family modules
  - path: contracts_impl/shared.py
    role: Shared schema helper primitives and validation rule builders
  - path: contracts_impl/memory.py
    role: Memory, contact, WhatsApp, conflict, and user-discovery schema families
  - path: contracts_impl/runtime_state.py
    role: World-intelligence, setting, quiet-mode, and identity schema families
public_api:
  module: twinr.agent.tools.schemas.contracts
  callables:
    - build_agent_tool_schemas
    - build_compact_agent_tool_schemas
    - build_realtime_tool_schemas
compatibility_reexports:
  - path: src/twinr/agent/tools/__init__.py
    names:
      - build_agent_tool_schemas
      - build_compact_agent_tool_schemas
      - build_realtime_tool_schemas
primary_callers:
  - path: src/twinr/agent/workflows/streaming_runner.py
  - path: src/twinr/orchestrator/session.py
  - path: src/twinr/providers/openai/realtime.py
tests:
  - path: test/test_openai_realtime.py
  - path: test/test_user_discovery.py
  - path: test/test_streaming_runner.py
  - path: test/run_pi_tool_matrix.py
