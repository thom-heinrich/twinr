schema_version: 1
name: handlers
path: src/twinr/agent/tools/handlers
kind: python-package
visibility: internal
summary: Concrete realtime tool handlers and shared guard helpers for automation, smart-home, memory, reminder, browser automation, external service-connect, WhatsApp sending, guided user-discovery, world-intelligence, output, self-coding, settings, voice-profile, portrait-identity, and shared household-identity tool calls.
owned_concerns:
  - Validate and normalize tool-call payloads at the handler boundary
  - Translate tool requests into bounded runtime reads and mutations
  - Bridge the optional versioned browser-automation boundary into the realtime tool surface without importing concrete browser stacks into src/
  - Expose one bounded service-connect handler so spoken requests can start supported external pairing flows and surface QR/status state on Twinr displays
  - Expose one bounded WhatsApp-send handler that resolves remembered contacts and hands delivery off to the running channel service after explicit final confirmation
  - Expose one smart-home tool surface for entity discovery, filtered state queries, low-risk control, and bounded stream inspection
  - Expose one temporary voice-quiet tool surface that suppresses transcript-first wake and automatic follow-up for a bounded runtime window without mutating persistent settings
  - Keep handler-local telemetry, audit events, and follow-up side effects best-effort
  - Share live-audio, sensitive-action confirmation, and primitive coercion helpers across handler families
  - Share automation-specific delivery, tag, weekday, and timezone parsing across handler and background boundaries
  - Return structured portrait-enrollment guidance so the model can drive camera retries naturally
  - Return structured shared household-identity guidance for local face, voice, status, and explicit confirm or deny feedback flows
  - Bridge the self-coding front-stage learning flow into deterministic ASE modules
  - Share self-coding runtime/cache/signature construction outside the tool-entrypoint file
  - Keep the guided get-to-know-you flow bounded while persisting, reviewing, correcting, and deleting high-value discovery facts across Twinr memory surfaces
  - Expose one explicit tool handler for RSS/world-intelligence subscription setup and occasional recalibration
out_of_scope:
  - Tool registry, binding, schemas, or prompt instruction assembly
  - Runtime, store, provider, backend, or web-dashboard implementations
  - Workflow-loop orchestration and background delivery control
  - Operator-facing UI behavior outside tool responses
files:
  - path: __init__.py
    role: Package marker with package-level summary
  - path: automation_support.py
    role: Shared automation-specific parsing and delivery helpers used by handler and background paths
    exports:
      - automation_name_key
      - resolve_timezone_name
      - validate_non_negative_finite
      - parse_delivery
      - parse_content_mode
      - normalize_delivery
      - parse_weekdays
      - parse_tags
  - path: automations.py
    role: Automation CRUD handlers
    exports:
      - handle_list_automations
      - handle_create_time_automation
      - handle_create_sensor_automation
      - handle_update_time_automation
      - handle_update_sensor_automation
      - handle_delete_automation
  - path: browser.py
    role: Optional browser-automation handler that validates tool payloads and bridges to the local browser boundary
    exports:
      - handle_browser_automation
  - path: service_connect.py
    role: External service-connect handler that validates the target service and starts a bounded pairing flow
    exports:
      - handle_connect_service_integration
  - path: whatsapp.py
    role: Bounded WhatsApp-send handler that resolves remembered contacts, asks for explicit final confirmation, and queues delivery through the running channel service
    exports:
      - handle_send_whatsapp_message
  - path: handler_telemetry.py
    role: Shared best-effort telemetry, event, and usage callback helpers
    exports:
      - emit_best_effort
      - record_event_best_effort
      - record_usage_best_effort
  - path: smarthome.py
    role: Smart-home entity discovery, filtered state read, control, and stream handlers
    exports:
      - handle_control_smart_home_entities
      - handle_list_smart_home_entities
      - handle_read_smart_home_sensor_stream
      - handle_read_smart_home_state
  - path: memory.py
    role: Durable-memory, contact, preference, and plan handlers
    exports:
      - handle_remember_memory
      - handle_remember_contact
      - handle_lookup_contact
      - handle_get_memory_conflicts
      - handle_resolve_memory_conflict
      - handle_remember_preference
      - handle_remember_plan
      - handle_update_user_profile
      - handle_update_personality
  - path: user_discovery.py
    role: Guided get-to-know-you, review, correction, deletion, and structured memory-routing handler
    exports:
      - handle_manage_user_discovery
  - path: intelligence.py
    role: RSS/world-intelligence subscription and refresh-config handler
    exports:
      - handle_configure_world_intelligence
  - path: output.py
    role: Print, search, camera, and conversation-output handlers
    exports:
      - handle_print_receipt
      - handle_search_live_info
      - handle_inspect_camera
      - handle_end_conversation
  - path: household_identity.py
    role: Shared local household-identity handler for face, voice, status, and explicit feedback
    exports:
      - handle_manage_household_identity
  - path: portrait_identity.py
    role: Local portrait-identity enrollment, status, and reset handlers
    exports:
      - handle_enroll_portrait_identity
      - handle_get_portrait_identity_status
      - handle_reset_portrait_identity
  - path: reminders.py
    role: Reminder scheduling handler
    exports:
      - handle_schedule_reminder
  - path: self_coding.py
    role: Self-coding learning, activation, and hidden runtime-entry handlers
    exports:
      - handle_propose_skill_learning
      - handle_answer_skill_question
      - handle_confirm_skill_activation
      - handle_rollback_skill_activation
      - handle_pause_skill_activation
      - handle_reactivate_skill_activation
      - handle_run_self_coding_skill_scheduled
      - handle_run_self_coding_skill_sensor
      - ensure_self_coding_runtime
  - path: self_coding_support.py
    role: Shared self-coding runtime/cache/signature support for handler entrypoints
    exports:
      - SELF_CODING_RUNTIME_LOCK
      - ensure_confirm_activation_job_ready
      - ensure_self_coding_runtime
      - resolve_activation_service
      - resolve_learning_flow
  - path: settings.py
    role: Bounded simple-setting mutation handler
    exports:
      - handle_update_simple_setting
  - path: voice_quiet.py
    role: Temporary runtime-only voice quiet-window handler
    exports:
      - handle_manage_voice_quiet_mode
  - path: support.py
    role: Shared voice guards and primitive argument coercion
    exports:
      - VoiceGuardError
      - MissingLiveAudioError
      - SensitiveActionConfirmationRequired
      - ArgumentValidationError
      - require_current_turn_audio
      - require_sensitive_voice_confirmation
      - optional_bool
      - optional_float
  - path: voice_profile.py
    role: Voice-profile enrollment, status, and reset handlers
    exports:
      - handle_enroll_voice_profile
      - handle_get_voice_profile_status
      - handle_reset_voice_profile
primary_callers:
  - path: src/twinr/agent/tools/runtime/executor.py
  - path: src/twinr/agent/workflows/realtime_runner.py
  - path: src/twinr/agent/workflows/streaming_runner.py
  - path: src/twinr/agent/workflows/realtime_runtime/background.py
  - path: src/twinr/__main__.py
tests:
  - path: test/test_browser_automation.py
  - path: test/test_browser_dual_lane_loop.py
  - path: test/test_realtime_runner.py
  - path: test/test_realtime_runner_helpers.py
  - path: test/test_self_coding_dialogue.py
  - path: test/test_openai_realtime.py
  - path: test/test_tool_broker_policy.py
  - path: test/test_automations.py
  - path: test/test_reminders.py
  - path: test/test_simple_settings.py
  - path: test/test_voice_profile.py
  - path: test/test_household_identity.py
  - path: test/test_self_coding_handler_support.py
  - path: test/test_user_discovery.py
  - path: test/test_streaming_tool_loop.py
  - path: test/run_pi_tool_matrix.py
