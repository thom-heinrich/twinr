schema_version: 1
name: self_coding
path: src/twinr/agent/self_coding
kind: python-package
visibility: internal
summary: Adaptive Skill Engine core package for contracts, runtime persistence, deterministic capability readiness, requirements dialogue, the first automation_manifest compiler, the first local compile-worker slice with a pinned Codex SDK primary, and soft-launch activation.
owned_concerns:
  - Define the stable internal contract objects used across future ASE layers
  - Persist compile jobs and compile artifacts under the Twinr runtime state tree
  - Persist compile run status for operator/debug visibility under the Twinr runtime state tree
  - Resolve the deterministic MVP capability readiness view for self-coding feasibility checks
  - Decide whether a draft skill request fits the current automation-first or later skill-package envelope
  - Persist and advance the deterministic requirements-dialogue state machine for self-coding
  - Validate and canonicalize automation_manifest compile outputs into activation-ready Twinr artifacts
  - Create queued self-coding compile jobs and run them through bounded local Codex drivers
  - Stage, confirm, and roll back versioned automation-backed learned skills
  - Build compact operator-facing status summaries from persisted self-coding state
out_of_scope:
  - Workflow-loop orchestration and live conversation hooks
  - Long-horizon health scoring and autonomous pause policy
  - Deep compile-target validation and later compiler specialization work
  - Sandboxed skill execution and brokered effect enforcement
files:
  - path: __init__.py
    role: Package export surface for ASE core entrypoints
    exports:
      - ActivationRecord
      - ArtifactKind
      - build_self_coding_operator_status
      - CapabilityAvailability
      - CapabilityDefinition
      - CapabilityRiskClass
      - CapabilityStatus
      - CompileArtifactRecord
      - CompileJobRecord
      - CompileRunStatusRecord
      - CompileJobStatus
      - CompileTarget
      - CodexSdkDriver
      - FeasibilityOutcome
      - FeasibilityResult
      - LearnedSkillStatus
      - LocalCodexCompileDriver
      - SelfCodingActivationService
      - RequirementsDialogueSession
      - RequirementsDialogueStatus
      - SelfCodingCapabilityRegistry
      - SelfCodingFeasibilityChecker
      - SelfCodingLearningFlow
      - SelfCodingLearningUpdate
      - SelfCodingOperatorStatus
      - SelfCodingRequirementsDialogue
      - SelfCodingStore
      - SkillSpec
      - SkillTriggerSpec
      - self_coding_store_root
  - path: contracts.py
    role: Versioned ASE contract dataclasses and payload round-trips
  - path: status.py
    role: Shared ASE lifecycle enums
  - path: store.py
    role: File-backed self-coding persistence layer
  - path: compiler
    role: Deterministic compile-target validation and canonicalization
  - path: capability_registry.py
    role: Deterministic MVP capability readiness resolver
  - path: feasibility.py
    role: Deterministic Phase-1 feasibility policy
  - path: requirements_dialogue.py
    role: Deterministic Phase-2 dialogue state machine
  - path: learning_flow.py
    role: Thin application service coordinating feasibility and dialogue persistence
  - path: worker.py
    role: Queued compile-job creation and local compile execution
  - path: activation.py
    role: Versioned soft-launch staging, confirmation, and rollback
  - path: operator_status.py
    role: Compact operator-facing status summary
  - path: codex_driver
    role: Pinned Codex SDK bridge, exec fallback, and bounded workspace helpers
public_api:
  module: twinr.agent.self_coding
  exports:
    - ActivationRecord
    - ArtifactKind
    - build_self_coding_operator_status
    - CapabilityAvailability
    - CapabilityDefinition
    - CapabilityRiskClass
    - CapabilityStatus
    - CompileArtifactRecord
    - CompileJobRecord
    - CompileRunStatusRecord
    - CompileJobStatus
    - CompileTarget
    - CodexSdkDriver
    - FeasibilityOutcome
    - FeasibilityResult
    - LearnedSkillStatus
    - LocalCodexCompileDriver
    - SelfCodingActivationService
    - RequirementsDialogueSession
    - RequirementsDialogueStatus
    - SelfCodingCapabilityRegistry
    - SelfCodingCompileWorker
    - SelfCodingFeasibilityChecker
    - SelfCodingLearningFlow
    - SelfCodingLearningUpdate
    - SelfCodingOperatorStatus
    - SelfCodingRequirementsDialogue
    - SelfCodingStore
    - SkillSpec
    - SkillTriggerSpec
    - self_coding_store_root
primary_callers:
  - path: src/twinr/agent/self_coding/IMPLEMENTATION_PLAN.md
  - path: src/twinr/agent/tools/handlers/self_coding.py
tests:
