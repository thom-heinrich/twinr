name: personality
path: src/twinr/agent/personality
kind: python-package
summary: Typed evolving-personality models, background learning, and prompt-layer planning for Twinr's companion identity.
responsibilities:
  - Define structured personality, conversation-style, humor, relationship, continuity, place/world, and reflection models.
  - Translate structured personality state into ordered prompt layers that preserve the legacy section contract.
  - Render a bounded conversational self-expression and current-mindshare layer so Twinr can speak naturally from ongoing themes.
  - Derive bounded per-topic conversation appetite cues so surfaced themes carry explicit depth, follow-up, and proactivity guidance.
  - Derive explicit positive-engagement actions from appetite, ongoing interest, and co-attention so Twinr can foster welcomed interaction without hardcoded topic logic.
  - Derive calm ambient display-impulse candidates and reserve-card copy with an explanatory headline plus a separate CTA line from the same structured state so Twinr's evolving tone, shared topics, and memory-follow-up needs can surface visually without speech.
  - Correlate shown reserve-card exposures with later structured turn evidence so visual prompts feed back into the same bounded engagement and personality-learning loop.
  - Distinguish immediate reserve-card pickup or pushback from slower reactions so Twinr can remember how directly a shown card landed and optionally bias the same-day reserve plan faster.
  - Derive authoritative per-turn steering cues from co-attention and appetite so shared-thread topics can shape brief updates, follow-ups, and observation behavior.
  - Serialize turn-steering cues for tool evaluators and resolve matched topics back into bounded follow-up runtime behavior.
  - Reuse persisted ongoing-interest cues from repeated user returns so some themes can become more alive in Twinr's mindshare without becoming addictive or pushy.
  - Reuse persisted co-attention state so shared user/Twinr themes can surface as calm running threads instead of isolated hints.
  - Provide clean persistence seams for remote snapshot state that can later be backed directly by ChonkyDB-derived personality objects.
  - Expose a narrow public read seam for persisted engagement signals so downstream runtime features can adapt from the same durable state as prompting.
  - Extract structured interaction, continuity, place, and world signals from long-term consolidation output and tool history.
  - Promote explicit structured topic follow-up reactions into stronger engagement evidence for mindshare and world-intelligence calibration.
  - Track bounded engagement states so resonant topics surface more often while cooling or avoided topics back off without one-turn overreaction.
  - Gate background learning so repeated signals can evolve the durable personality snapshot without one-off drift.
  - Manage RSS/Atom subscriptions and refresh their calm place/world context into bounded world and continuity updates.
  - Decay stale world and relationship context, relax stale engagement boosts, and reject contradictory or sensitive-context personality drift.
out_of_scope:
  - Provider-specific prompt phrasing.
  - Memory, reminder, automation, and graph persistence implementations.
  - Workflow-loop selection of dynamic context sections.
files:
  - path: __init__.py
    role: Narrow package export surface for structured personality helpers.
  - path: _payload_utils.py
    role: Shared payload normalization helpers reused by personality and intelligence model decoding.
  - path: models.py
    role: Typed evolving-personality state including conversation style, relationship stance, and prompt-layer contracts.
  - path: profile_defaults.py
    role: Shared baseline style and humor profiles used by runtime evolution and evaluation tooling.
  - path: context_builder.py
    role: Ordered prompt-layer assembly.
  - path: self_expression.py
    role: Conversational self-expression policy and prompt-facing current-mindshare rendering.
  - path: _display_utils.py
    role: Shared text normalization, truncation, and deterministic variation helpers for ambient display generation.
  - path: display_impulse_copy.py
    role: Reserve-card copy builder that keeps the large headline explanatory, the smaller second line as CTA, and the topic context generic and policy-driven.
  - path: display_impulses.py
    role: Generic ambient display-impulse candidate generation from mindshare and positive-engagement state, including semantic card_intent payloads for reserve-card rewriting.
  - path: ambient_feedback.py
    role: Generic reserve-card feedback extraction that correlates shown-card exposure history with later structured turn evidence.
  - path: positive_engagement.py
    role: Explicit positive-engagement actions that convert generic appetite/co-attention state into bounded turn actions.
  - path: steering.py
    role: Authoritative turn-steering cues plus compact runtime follow-up resolution derived from co-attention and appetite.
  - path: _remote_state_utils.py
    role: Shared remote-primary adapter resolution for personality and intelligence snapshot persistence seams.
  - path: store.py
    role: Remote snapshot persistence seam for snapshots, signals, and deltas.
  - path: evolution.py
    role: Policy-gated background evolution loop with contradiction, sensitivity, and decay maintenance.
  - path: signals.py
    role: Structured signal taxonomy plus extraction from consolidation and tool history.
  - path: learning.py
    role: Runtime-facing bridge from extracted signals into background evolution.
  - path: intelligence
    role: RSS/world-intelligence subscription, discovery, refresh, and remote-state helpers.
  - path: service.py
    role: Prompting-facing service plus the public read seam for persisted engagement signals used by downstream runtime consumers such as the ambient reserve bus.
public_api:
  module: twinr.agent.personality
  exports:
    - BackgroundPersonalityEvolutionLoop
    - ConversationStyleProfile
    - InteractionSignal
    - PersonalityLearningService
    - PersonalityContextBuilder
    - PersonalityContextService
    - AmbientDisplayImpulseCandidate
    - build_ambient_display_impulse_candidates
    - FollowUpSteeringDecision
    - PersonalityEvolutionLoop
    - PersonalityEvolutionPolicy
    - PersonalitySignalBatch
    - PersonalitySignalExtractor
    - PersonalitySnapshot
    - PersonalityPromptPlan
    - PlaceSignal
    - PositiveEngagementTopicPolicy
    - build_positive_engagement_policies
    - resolve_follow_up_steering
    - RemoteStatePersonalityEvolutionStore
    - RemoteStatePersonalitySnapshotStore
    - RemoteStateWorldIntelligenceStore
    - render_positive_engagement_policy
    - serialize_turn_steering_cues
    - WorldFeedSubscription
    - WorldIntelligenceConfigRequest
    - WorldIntelligenceService
    - WorldSignal
tests:
  - path: test/test_agent_personality.py
  - path: test/test_personality.py
  - path: test/test_personality_display_impulses.py
  - path: test/test_display_ambient_feedback.py
