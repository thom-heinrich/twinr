schema_version: 1
name: workflows
path: src/twinr/agent/workflows
kind: python-package
visibility: internal
summary: Orchestrate the active realtime and streaming Twinr hardware loops plus their bounded capture, speech, print, and feedback helpers.
owned_concerns:
  - Orchestrate button, voice-activation, configured visual gesture-wakeup, and proactive entry points for Twinr hardware loops
  - Coordinate live conversation sessions, print delivery, and bounded speech output
  - Bridge bounded edge audio and runtime-state updates into the server-backed voice orchestrator without moving runtime-state ownership off the Pi loop
  - Coordinate bounded same-stream transcript commits from the server-backed voice orchestrator so live wake/listen turns stay remote and the Pi remains an I/O edge
  - Replay the runtime-owned temporary voice-quiet window into the live voice orchestrator and suppress automatic follow-up reopening while that bounded quiet window is active
  - Keep remote live barge-in on that same server stream instead of reopening a second local interrupt-STT watcher on the Pi
  - Keep live capture paths from failing immediately on proven transient XVF3800 re-enumeration by reusing the bounded hardware-level recovery helper
  - Cache and replay one normalized activation-ack payload so the Pi confirmation voice stays audible without widening broader speech policy
  - Start one bounded managed smart-home sensor worker and feed its normalized observations into the realtime sensor path
  - Hold fatal loop/bootstrap failures in a stable runtime error state so the Pi display companion and supervisor do not flap back to the desktop
  - Forward completed tool-call history into runtime-side personality learning after turn finalization
  - Keep turn-guidance context shaping and transcript-verifier gate policy outside the active loop classes
  - Adapt authoritative local semantic-router decisions, including optional two-stage user-intent routing, into supervisor-compatible handoffs for the streaming loop without moving bundle or ONNX logic into this package
  - Serialize beep, feedback, and spoken playback under one priority-aware speaker coordinator
  - Render and queue one bounded startup boot clip from media/boot.mp3 through the shared playback coordinator without blocking loop startup
  - Render and cache reusable workflow media clips while keeping the dragon processing MP3 as the default Pi thinking sound and falling back to synthesized tones when a cold cache or missing asset prevents immediate media playback
  - Keep required remote-memory fail-closed checks off the GPIO polling thread
  - Bridge structured personality steering cues into concrete follow-up reopen/close decisions
  - Choose speech versus display-first delivery for non-safety proactive prompts based on quiet hours, media/noise suppression, and bounded repeat cooldowns, with display-first prompts routed into the right-hand reserve lane instead of fullscreen presentation
  - Trigger one bounded overnight reserve-lane maintenance pass from the idle housekeeping worker so the next local day can start from a reviewed/prepared ambient companion plan
  - Produce bounded forensic run packs for live button/session/audio investigation
  - Capture bounded helper-thread snapshots for live dual-lane watchdog and timeout failures
  - Share workflow-local support helpers for feedback tones, reference images, background delivery, and streaming capture
  - Expose the active workflow entry points without eager runner imports
out_of_scope:
  - Runtime state, memory, reminder, or automation store implementations
  - Provider transport adapters, prompt authoring, or tool schema definitions
  - Hardware driver implementations for audio, camera, printer, buttons, or display
  - Web dashboard flows or operator-facing setup scripts
files:
  - path: __init__.py
    role: Lazy workflow package export surface
    exports:
      - SocialTriggerDecision
      - SocialTriggerEngine
      - TwinrRealtimeHardwareLoop
      - TwinrStreamingHardwareLoop
  - path: realtime_runner.py
    role: Compatibility wrapper that preserves the public realtime-loop import path plus legacy module patch points for startup boot sound and smart-home adapter injection
    exports:
      - TwinrRealtimeHardwareLoop
  - path: realtime_runner_impl/__init__.py
    role: Internal export surface for the refactored realtime-loop implementation package
    exports:
      - TwinrRealtimeHardwareLoopImpl
  - path: realtime_runner_impl/main.py
    role: Compose the internal realtime-loop implementation from focused mixins
    exports:
      - TwinrRealtimeHardwareLoopImpl
  - path: realtime_runner_impl/bootstrap.py
    role: Realtime-loop bootstrap, collaborator wiring, tool-surface refresh, and managed smart-home worker setup
  - path: realtime_runner_impl/session.py
    role: Run-loop orchestration, wake triggers, conversation-session lifecycle, and remote voice-orchestrator coordination
  - path: realtime_runner_impl/turn_capture.py
    role: Turn-controller streaming capture, transcript recovery, and early-snapshot coercion
  - path: realtime_runner_impl/turn_execution.py
    role: Single-turn execution, streamed playback/interrupt handling, voice-activation ack caching, and print-lane enqueue helpers
  - path: realtime_follow_up.py
    role: Focused follow-up reopening and closure-decision helper for the realtime loop
    exports:
      - apply_follow_up_closure_evaluation
      - emit_closure_decision
      - evaluate_follow_up_closure
      - follow_up_allowed_for_source
      - follow_up_vetoed_by_closure
  - path: voice_orchestrator.py
    role: Edge-side voice websocket bridge that streams bounded audio/runtime-state updates, survives bounded transient XVF3800 capture loss, and dispatches wake, same-stream transcript commits, follow-up-close, and barge-in events back into the realtime loop
    exports:
      - EdgeVoiceOrchestrator
  - path: voice_orchestrator_runtime.py
    role: Runtime-side voice-orchestrator state replay, intent-context refresh, same-stream transcript handoff, and remote follow-up helper
    exports:
      - begin_remote_transcript_wait
      - handle_remote_transcript_committed
      - notify_voice_orchestrator_state
      - pause_voice_orchestrator_capture
      - prime_voice_orchestrator_waiting_state
      - refresh_voice_orchestrator_sensor_context
      - resume_voice_orchestrator_capture
      - voice_orchestrator_follow_up_mode
      - voice_orchestrator_handles_follow_up
      - voice_orchestrator_owns_live_listening
      - wait_for_remote_transcript_commit
  - path: remote_transcript_commit.py
    role: Coordinate active waits for server-side transcript commits during remote listen windows
    exports:
      - RemoteTranscriptCommit
      - RemoteTranscriptCommitCoordinator
      - RemoteTranscriptClose
      - RemoteTranscriptWaitHandle
  - path: streaming_runner.py
    role: Streaming loop entrypoint and turn orchestration shell that delegates capture, speculation, planning, and turn execution
    exports:
      - TwinrStreamingHardwareLoop
  - path: follow_up_steering.py
    role: Runtime helper that loads personality steering cues and applies them to follow-up reopen/close decisions
    exports:
      - FollowUpRuntimeDecision
      - FollowUpSteeringRuntime
  - path: runtime_error_hold.py
    role: Stable runtime-error hold helper that keeps the display companion alive and refreshes runtime snapshots after fatal loop failures
    exports:
      - hold_runtime_error_state
  - path: turn_guidance.py
    role: Bounded turn-controller context selection and turn-label guidance runtime
    exports:
      - TurnGuidanceContext
      - TurnGuidanceRuntime
  - path: streaming_transcript_verifier.py
    role: Low-evidence transcript recovery and explicit verifier-gate runtime
    exports:
      - TranscriptVerifierGateDecision
      - StreamingTranscriptVerifierRuntime
  - path: streaming_capture.py
    role: Streaming microphone-capture, same-stream remote transcript wait, timeout, and batch-STT fallback controller
    exports:
      - StreamingAudioTurnRequest
      - StreamingCaptureController
  - path: streaming_speculation.py
    role: Speculative first-word and supervisor warmup controller for the streaming loop
  - path: streaming_lane_planner.py
    role: Streaming lane-plan construction, final-lane path selection, and LLM recovery callback wiring
  - path: streaming_supervisor_context.py
    role: Build per-turn fast-lane supervisor instructions, including visible-card grounding overlays
    exports:
      - build_streaming_supervisor_turn_instructions
  - path: streaming_semantic_router.py
    role: Streaming workflow bridge from local semantic-router decisions, including optional two-stage user-intent routing, into supervisor-style handoffs and bridge replies
    exports:
      - LocalSemanticRouteResolution
      - StreamingSemanticRouterRuntime
  - path: streaming_turn_coordinator.py
    role: Authoritative streaming turn state machine for speech lifecycle, deadlines, cancellation, completion, and post-turn tool-history forwarding
    exports:
      - StreamingTurnCoordinator
      - StreamingTurnCoordinatorHooks
      - StreamingTurnExecutionOutcome
      - StreamingTurnLanePlan
      - StreamingTurnRequest
      - StreamingTurnSpeechServices
  - path: streaming_turn_orchestrator.py
    role: Low-level bridge/final lane watchdog helper plus LLM recovery handoff for the streaming turn coordinator
    exports:
      - StreamingTurnOrchestrator
      - StreamingTurnTimeoutPolicy
      - StreamingTurnLaneOutcome
  - path: playback_coordinator.py
    role: Single-owner speaker queue with priority and preemption across beep, feedback, and TTS
    exports:
      - PlaybackCoordinator
      - PlaybackPriority
      - PlaybackRunResult
  - path: rendered_audio_clip.py
    role: Render, normalize, chunk, and cache reusable workflow media clips
    exports:
      - RenderedAudioClipSpec
      - RenderedAudioClipError
      - RenderedAudioClipConfigurationError
      - RenderedAudioClipRenderError
      - build_rendered_audio_clip_wav_bytes
      - iter_wav_bytes_chunks
  - path: startup_boot_sound.py
    role: Render and queue the bounded startup boot clip through the shared playback coordinator
    exports:
      - build_startup_boot_sound_wav_bytes
      - play_startup_boot_sound
      - start_startup_boot_sound
  - path: realtime_runtime/background.py
    role: Active reminder, automation, and proactive background-delivery mixin, including reserve-lane routing for display-first proactive prompts and the overnight reserve-lane maintenance trigger
    exports:
      - TwinrRealtimeBackgroundMixin
  - path: realtime_runtime/background_delivery.py
    role: Idle-window gate for background speech/display delivery starts
    exports:
      - BackgroundDeliveryBlocked
      - begin_background_delivery
      - background_block_reason
      - background_block_reason_locked
      - background_work_allowed
  - path: realtime_runtime/reminder_delivery.py
    role: Focused reminder phrasing and reminder-speech delivery helpers with deterministic local fallback text
    exports:
      - LocalMetadataResponse
      - default_due_reminder_text
      - deliver_due_reminder
      - phrase_due_reminder_with_fallback
      - safe_format_due_label
  - path: realtime_runtime/proactive_delivery.py
    role: Display-first versus speech delivery policy for proactive background prompts
    exports:
      - ProactiveDeliveryDecision
      - ProactiveDeliveryPolicy
  - path: realtime_runtime/support.py
    role: Active emit, media, config, and feedback helpers for the realtime runtime
    exports:
      - TwinrRealtimeSupportMixin
      - _default_emit
  - path: realtime_runtime/required_remote_support.py
    role: Focused required-remote fail-closed gating, watchdog-artifact attestation, and recovery helper for live loops
    exports:
      - attest_watchdog_artifact_remote_ready
      - best_effort_stop_player
      - current_runtime_error_matches_required_remote
      - enter_required_remote_error
      - refresh_required_remote_dependency
      - remote_dependency_is_required
      - request_required_remote_dependency_refresh
      - required_remote_dependency_current_ready
      - required_remote_dependency_interval_seconds
      - required_remote_dependency_recovery_hold_seconds
      - required_remote_dependency_uses_watchdog_artifact
  - path: realtime_runtime/vision_support.py
    role: Safe reference-image loading, live camera image bundling, and bounded vision prompt construction
    exports:
      - build_image_input
      - build_vision_images
      - build_vision_prompt
      - load_reference_image
      - normalize_reference_image_path
      - safe_read_reference_image_bytes
      - validate_reference_image_base_dir
  - path: realtime_runner_tools.py
    role: Thin realtime tool-callback delegate mixin, including smart-home and RSS/world-intelligence wiring
    exports:
      - TwinrRealtimeToolDelegatesMixin
  - path: button_dispatch.py
    role: Non-blocking button dispatch and busy-turn interruption helper
  - path: required_remote_watch.py
    role: Background required-remote readiness watch for fail-closed runtimes
  - path: required_remote_snapshot.py
    role: External remote-watchdog snapshot evaluation for live loop gating, including bounded recovery of a dead detached watchdog owner
  - path: speech_output.py
    role: Interruptible streamed TTS playback queue with first-audio gating and fast aborts
    exports:
      - InterruptibleSpeechOutput
      - StreamingTextToSpeechProviderLike
      - WaveAudioPlayerLike
  - path: forensics.py
    role: Queue-based forensic workflow tracing, runpack generation, and bounded helper-thread snapshots
    exports:
      - WorkflowForensics
  - path: print_lane.py
    role: Single-job background print lane
    exports:
      - PrintLaneRequest
      - TwinrPrintLane
  - path: working_feedback.py
    role: Bounded processing, answering, and printing tone/media loops with the dragon processing MP3 as the default think cue plus synthesized fallback support
    exports:
      - WorkingFeedbackKind
      - WorkingFeedbackProfile
      - start_working_feedback_loop
  - path: working_feedback_tone.py
    role: Synthesized processing-tone helper used by fallback/defaultless processing paths and direct tests
    exports:
      - PROCESSING_SWELL_TONE_SPEC
      - SwellingFeedbackToneSpec
      - build_swelling_feedback_tone_pcm16
      - build_swelling_feedback_tone_wav_bytes
primary_callers:
  - path: src/twinr/__main__.py
  - path: src/twinr/agent/tools/handlers/output.py
  - path: src/twinr/agent/tools/runtime/dual_lane_loop.py
tests:
  - path: test/test_playback_coordinator.py
  - path: test/test_rendered_audio_clip.py
  - path: test/test_startup_boot_sound.py
  - path: test/test_main.py
  - path: test/test_orchestrator.py
  - path: test/test_realtime_runner.py
  - path: test/test_streaming_runner.py
  - path: test/test_dual_lane_loop.py
  - path: test/test_speech_output.py
  - path: test/test_working_feedback.py
  - path: test/test_working_feedback_tone.py
  - path: test/test_workflow_forensics.py
  - path: test/test_openai_realtime.py
  - path: test/test_longterm_multimodal.py
  - path: test/test_realtime_runtime_helpers.py
  - path: test/test_realtime_runner_helpers.py
  - path: test/run_pi_tool_matrix.py
