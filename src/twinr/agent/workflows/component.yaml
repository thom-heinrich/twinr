schema_version: 1
name: workflows
path: src/twinr/agent/workflows
kind: python-package
visibility: internal
summary: Orchestrate the active realtime and streaming Twinr hardware loops plus their bounded capture, speech, print, and feedback helpers while retaining compatibility shims for older loop imports.
owned_concerns:
  - Orchestrate button, wakeword, configured visual gesture-wakeup, and proactive entry points for Twinr hardware loops
  - Coordinate live conversation sessions, print delivery, and bounded speech output
  - Bridge bounded edge audio and runtime-state updates into the server-backed voice orchestrator without moving runtime-state ownership off the Pi loop
  - Keep live capture paths from failing immediately on proven transient XVF3800 re-enumeration by reusing the bounded hardware-level recovery helper
  - Cache and replay one normalized wakeword-ack payload so the Pi confirmation voice stays audible without widening broader speech policy
  - Start one bounded managed smart-home sensor worker and feed its normalized observations into the realtime sensor path
  - Hold fatal loop/bootstrap failures in a stable runtime error state so the Pi display companion and supervisor do not flap back to the desktop
  - Forward completed tool-call history into runtime-side personality learning after turn finalization
  - Keep turn-guidance context shaping and transcript-verifier gate policy outside the active loop classes
  - Adapt authoritative local semantic-router decisions, including optional two-stage user-intent routing, into supervisor-compatible handoffs for the streaming loop without moving bundle or ONNX logic into this package
  - Serialize beep, feedback, and spoken playback under one priority-aware speaker coordinator
  - Keep required remote-memory fail-closed checks off the GPIO polling thread
  - Bridge structured personality steering cues into concrete follow-up reopen/close decisions
  - Choose speech versus display-first delivery for non-safety proactive prompts based on quiet hours, media/noise suppression, and bounded repeat cooldowns, with display-first prompts routed into the right-hand reserve lane instead of fullscreen presentation
  - Trigger one bounded overnight reserve-lane maintenance pass from the idle housekeeping worker so the next local day can start from a reviewed/prepared ambient companion plan
  - Produce bounded forensic run packs for live button/session/audio investigation
  - Share workflow-local support helpers for feedback tones, reference images, background delivery, and streaming capture
  - Expose compatibility workflow entry points for top-level imports and older proactive-trigger paths without eager runner imports
out_of_scope:
  - Runtime state, memory, reminder, or automation store implementations
  - Provider transport adapters, prompt authoring, or tool schema definitions
  - Hardware driver implementations for audio, camera, printer, buttons, or display
  - Web dashboard flows or operator-facing setup scripts
files:
  - path: __init__.py
    role: Lazy workflow package export surface
    exports:
      - SocialTriggerDecision
      - SocialTriggerEngine
      - TwinrHardwareLoop
      - TwinrRealtimeHardwareLoop
      - TwinrStreamingHardwareLoop
  - path: runner.py
    role: Compatibility shim to the legacy classic press-to-talk hardware loop implementation
    exports:
      - TwinrHardwareLoop
  - path: realtime_runner.py
    role: Realtime session loop with wakeword, configured visual gesture-wakeup, print-lane, and smart-home sensor-worker orchestration that delegates guidance and transcript verification
    exports:
      - TwinrRealtimeHardwareLoop
  - path: voice_orchestrator.py
    role: Edge-side voice websocket bridge that streams bounded audio/runtime-state updates, survives bounded transient XVF3800 capture loss, and dispatches wake, follow-up, and barge-in events back into the realtime loop
    exports:
      - EdgeVoiceOrchestrator
  - path: streaming_runner.py
    role: Streaming loop entrypoint and turn orchestration shell that delegates capture, speculation, planning, and turn execution
    exports:
      - TwinrStreamingHardwareLoop
  - path: follow_up_steering.py
    role: Runtime helper that loads personality steering cues and applies them to follow-up reopen/close decisions
    exports:
      - FollowUpRuntimeDecision
      - FollowUpSteeringRuntime
  - path: runtime_error_hold.py
    role: Stable runtime-error hold helper that keeps the display companion alive and refreshes runtime snapshots after fatal loop failures
    exports:
      - hold_runtime_error_state
  - path: turn_guidance.py
    role: Bounded turn-controller context selection and turn-label guidance runtime
    exports:
      - TurnGuidanceContext
      - TurnGuidanceRuntime
  - path: streaming_transcript_verifier.py
    role: Low-evidence transcript recovery and explicit verifier-gate runtime
    exports:
      - TranscriptVerifierGateDecision
      - StreamingTranscriptVerifierRuntime
  - path: streaming_capture.py
    role: Streaming microphone-capture, timeout, and batch-STT fallback controller
    exports:
      - StreamingAudioTurnRequest
      - StreamingCaptureController
  - path: streaming_speculation.py
    role: Speculative first-word and supervisor warmup controller for the streaming loop
  - path: streaming_lane_planner.py
    role: Streaming lane-plan construction, final-lane path selection, and LLM recovery callback wiring
  - path: streaming_semantic_router.py
    role: Streaming workflow bridge from local semantic-router decisions, including optional two-stage user-intent routing, into supervisor-style handoffs and bridge replies
    exports:
      - LocalSemanticRouteResolution
      - StreamingSemanticRouterRuntime
  - path: streaming_turn_coordinator.py
    role: Authoritative streaming turn state machine for speech lifecycle, deadlines, cancellation, completion, and post-turn tool-history forwarding
    exports:
      - StreamingTurnCoordinator
      - StreamingTurnCoordinatorHooks
      - StreamingTurnExecutionOutcome
      - StreamingTurnLanePlan
      - StreamingTurnRequest
      - StreamingTurnSpeechServices
  - path: streaming_turn_orchestrator.py
    role: Low-level bridge/final lane watchdog helper plus LLM recovery handoff for the streaming turn coordinator
    exports:
      - StreamingTurnOrchestrator
      - StreamingTurnTimeoutPolicy
      - StreamingTurnLaneOutcome
  - path: playback_coordinator.py
    role: Single-owner speaker queue with priority and preemption across beep, feedback, and TTS
    exports:
      - PlaybackCoordinator
      - PlaybackPriority
      - PlaybackRunResult
  - path: realtime_runtime/background.py
    role: Active reminder, automation, and proactive background-delivery mixin, including reserve-lane routing for display-first proactive prompts and the overnight reserve-lane maintenance trigger
    exports:
      - TwinrRealtimeBackgroundMixin
  - path: realtime_runtime/proactive_delivery.py
    role: Display-first versus speech delivery policy for proactive background prompts
    exports:
      - ProactiveDeliveryDecision
      - ProactiveDeliveryPolicy
  - path: realtime_runtime/support.py
    role: Active emit, media, config, and feedback helpers for the realtime runtime
    exports:
      - TwinrRealtimeSupportMixin
      - _default_emit
  - path: realtime_runner_background.py
    role: Compatibility shim for the active realtime background-delivery mixin
    exports:
      - TwinrRealtimeBackgroundMixin
  - path: realtime_runner_support.py
    role: Compatibility shim for the active realtime support helpers
    exports:
      - TwinrRealtimeSupportMixin
  - path: realtime_runner_tools.py
    role: Thin realtime tool-callback delegate mixin, including smart-home and RSS/world-intelligence wiring
    exports:
      - TwinrRealtimeToolDelegatesMixin
  - path: button_dispatch.py
    role: Non-blocking button dispatch and busy-turn interruption helper
  - path: required_remote_watch.py
    role: Background required-remote readiness watch for fail-closed runtimes
  - path: required_remote_snapshot.py
    role: External remote-watchdog snapshot evaluation for live loop gating
  - path: speech_output.py
    role: Interruptible streamed TTS playback queue with first-audio gating and fast aborts
    exports:
      - InterruptibleSpeechOutput
      - StreamingTextToSpeechProviderLike
      - WaveAudioPlayerLike
  - path: forensics.py
    role: Queue-based forensic workflow tracing and runpack generation
    exports:
      - WorkflowForensics
  - path: print_lane.py
    role: Single-job background print lane
    exports:
      - PrintLaneRequest
      - TwinrPrintLane
  - path: working_feedback.py
    role: Bounded processing, answering, and printing tone loops
    exports:
      - WorkingFeedbackKind
      - WorkingFeedbackProfile
      - start_working_feedback_loop
  - path: social_triggers.py
    role: Compatibility wrapper for proactive trigger imports
compatibility_reexports:
  - path: src/twinr/runner.py
    mode: star
  - path: src/twinr/realtime_runner.py
    mode: star
primary_callers:
  - path: src/twinr/__main__.py
  - path: src/twinr/runner.py
  - path: src/twinr/realtime_runner.py
  - path: src/twinr/agent/tools/handlers/output.py
  - path: src/twinr/agent/tools/runtime/dual_lane_loop.py
tests:
  - path: test/test_playback_coordinator.py
  - path: test/test_main.py
  - path: test/test_orchestrator.py
  - path: test/test_runner.py
  - path: test/test_realtime_runner.py
  - path: test/test_streaming_runner.py
  - path: test/test_speech_output.py
  - path: test/test_workflow_forensics.py
  - path: test/test_openai_realtime.py
  - path: test/test_longterm_multimodal.py
  - path: test/run_pi_tool_matrix.py
