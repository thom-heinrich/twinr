schema_version: 1
name: web
path: src/twinr/web
kind: python-package
visibility: internal
summary: Serve Twinr's local FastAPI control surface and compose route handlers, shared web context, presenters, support primitives, templates, and static assets, including managed portal sign-in plus the self-coding, tabbed debug, Conversation Lab, and guided WhatsApp/email setup wizard pages with bounded mailbox connection checks.
owned_concerns:
  - Build the FastAPI app factory, control-plane middleware, and route handlers for Twinr's local dashboard and settings pages
  - Enforce managed portal sign-in, including first-login password change for the permanent Pi web service
  - Keep state-changing web requests fail-closed while honoring trusted same-origin posts behind a proxy-terminated HTTPS deployment
  - Expose the self-coding operator page and learned-skill control forms backed by `src/twinr/agent/self_coding`
  - Expose the tabbed debug page for runtime, ChonkyDB, live memory attestation, memory search, Conversation Lab, LLM, events, hardware, and raw artifacts
  - Persist and replay portal Conversation Lab sessions with human-readable turn traces while delegating real text-turn execution to focused helpers and isolating short-term session state from the shared Pi runtime snapshot
  - Provide camera-backed helper surfaces for Conversation Lab tool turns such as local portrait enrollment and inspect-camera requests
  - Expose the `/connect/whatsapp` wizard for one-number WhatsApp self-chat setup, including allowlist, runtime, a bounded pairing window, live worker status, and the final self-chat test
  - Expose the `/integrations/email` wizard for managed mailbox setup, including provider presets, mailbox login storage, transport review, bounded IMAP/SMTP connection tests, and final mail guardrails
  - Persist and read generic per-channel onboarding snapshots so pairing, reconnect, and repair-needed state survive page reloads
  - Centralize request-time config loading, store construction, and safe template rendering through `context.py`
  - Validate and persist web-driven automation, reminder, integration, provider, personality, and user-context edits through the appropriate helpers, including Hue-backed smart-home configuration on `/integrations`
  - Ship the package-local Jinja templates and static CSS used by the local control surface
out_of_scope:
  - Core runtime, provider, hardware, memory, or ops business logic outside route orchestration and operator-facing page composition
  - Presenter-specific section shaping and normalization under `src/twinr/web/presenters`
  - Generic file-backed contracts, form declarations, and persistence helpers under `src/twinr/web/support`
  - Raspberry Pi setup scripts and non-web operator workflows outside this package
files:
  - path: __init__.py
    role: Stable package export surface
    exports:
      - create_app
  - path: app.py
    role: Stable compatibility shim that preserves the `twinr.web.app` import path, helper exports, and monkeypatch surface while delegating the real implementation to `app_impl/`
    exports:
      - create_app
  - path: app_impl/
    role: Internal FastAPI implementation package split across auth, shell, ops, integrations/connect, automations, and preference routes
  - path: conversation_lab.py
    role: Portal conversation-lab session storage and real text-turn execution helper, including session-scoped runtime snapshot isolation for short-term context
  - path: conversation_lab_vision.py
    role: Camera and reference-image helpers used by Conversation Lab tool owners
  - path: context.py
    role: Shared request-time context, store factories, and safe template renderer
    exports:
      - WebAppContext
      - DEFAULT_RESTART_NOTICE
  - path: automations.py
    role: Automation page context builders and validated automation form persistence helpers
    exports:
      - AutomationFamilyCard
      - AutomationFamilyDefinition
      - AutomationFamilySection
      - AutomationFormSection
      - AutomationRow
      - build_automation_page_context
      - delete_automation
      - save_sensor_automation
      - save_time_automation
      - toggle_automation_enabled
  - path: presenters
    role: Template-ready page sections, normalized rows, and integration form builders
  - path: support
    role: Shared contracts, form-field declarations, file-backed persistence helpers, and WhatsApp wizard validation/probe helpers
  - path: templates
    role: Jinja templates for the local control surface
  - path: static
    role: Package-local CSS assets for the dashboard
public_api:
  module: twinr.web
  exports:
    - create_app
primary_callers:
  - path: src/twinr/__main__.py
  - path: test/test_web_app.py
tests:
  - path: test/test_web_app.py
  - path: test/test_web_store.py
