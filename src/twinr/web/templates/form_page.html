{% extends "base.html" %}
{% from "_form_fields.html" import render_setting_field %}

{% block content %}
<form method="post" action="{{ form_action }}" class="stack">
  {% for section in sections %}
  <section class="panel">
    <div class="section-header">
      <div>
        <h2>{{ section.title }}</h2>
        <p class="section-description">{{ section.description }}</p>
      </div>
    </div>
    <div class="form-grid">
      {% for field in section.fields %}
      {{ render_setting_field(field) }}
      {% endfor %}
    </div>
  </section>
  {% endfor %}
  <div class="actions">
    <button type="submit">Save changes</button>
  </div>
</form>
{% endblock %}
