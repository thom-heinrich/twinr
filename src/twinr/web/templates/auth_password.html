{% extends "base.html" %}

{% block content %}
<section class="panel auth-panel">
  <div class="section-header">
    <div>
      <h2>Set a new password</h2>
      <p class="section-description">Choose a password with at least {{ password_min_length }} characters.</p>
    </div>
  </div>
  <form class="auth-form" method="post" action="/auth/password">
    <label class="field">
      <span class="field-label">Current password</span>
      <input type="password" name="current_password" value="" autocomplete="current-password">
    </label>
    <label class="field">
      <span class="field-label">New password</span>
      <input type="password" name="new_password" value="" autocomplete="new-password">
    </label>
    <label class="field">
      <span class="field-label">Repeat new password</span>
      <input type="password" name="confirm_password" value="" autocomplete="new-password">
    </label>
    <div class="actions actions-start">
      <button type="submit">Save password</button>
    </div>
  </form>
</section>
{% endblock %}
