{% extends "base.html" %}

{% block content %}
<form method="post" action="{{ form_action }}" class="stack">
  {% for field in fields %}
  <section class="panel">
    <div class="section-header">
      <div>
        <h2>{{ field.label }}</h2>
        {% if field.help_text %}
        <p class="section-description">{{ field.help_text }}</p>
        {% endif %}
      </div>
    </div>
    <label class="field">
      <textarea name="{{ field.key }}" rows="16">{{ field.value }}</textarea>
    </label>
  </section>
  {% endfor %}
  <div class="actions">
    <button type="submit">Save changes</button>
  </div>
</form>
{% endblock %}
