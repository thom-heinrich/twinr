schema_version: 1
name: presenters
path: src/twinr/web/presenters
kind: python-package
visibility: internal
summary: Build template-ready presenter models and validated form-normalization helpers for Twinr's local web control surface.
owned_concerns:
  - Shape config, runtime, ops, reminder, and integration state into template-ready rows, sections, and page context dictionaries
  - Normalize malformed persisted values into stable operator-facing defaults instead of letting dashboard pages crash
  - Validate and canonicalize managed email and calendar form submissions before route handlers persist them
  - Validate and canonicalize managed smart-home Hue form submissions, including multi-bridge host lists and per-bridge application keys, before route handlers persist them
  - Build the compact email and WhatsApp setup summaries for `/integrations` while keeping the full guided flows in dedicated wizard presenters
  - Build and validate the `/integrations/email` guided mailbox setup wizard, including provider selection, mailbox login storage, transport defaults, bounded connection-test state, and final guardrails
  - Build and validate the `/integrations` social-history learning consent panel, including bounded source/window choices and operator-facing import status
  - Build the WhatsApp self-chat wizard page context, including bounded pairing-state rows, persisted onboarding snapshots, and live portal QR rendering, without moving route orchestration or subprocess calls into templates
  - Build the grouped primary shell navigation plus flatter Home, Settings shortcut, and `/advanced` hub card content so the top-level control surface stays short and consistent
  - Expose the curated presenter import surface consumed by `src/twinr/web/app.py` and `src/twinr/web/context.py`
  - Build self-coding operator telemetry rows from persisted self-coding state without moving policy into web routes
  - Build the tabbed `/ops/debug` operator context from authoritative runtime, watchdog, memory-attestation, usage, hardware, and raw artifact state
  - Shape the read-only `/ops/debug` memory-search tab from real long-term retrieval results without moving query execution into templates
  - Shape the interactive `/ops/debug` Conversation Lab tab from stored portal session traces without moving live text-turn execution into presenters
out_of_scope:
  - FastAPI route definitions, request parsing, redirects, and response handling in `src/twinr/web/app.py`
  - Template markup, styling, and client-side behavior under `src/twinr/web/templates` and static assets
  - Persistence contracts for `.env`, integrations, reminders, ops logs, or runtime snapshot stores outside presenter normalization
  - Hardware orchestration outside narrow guarded helpers such as voice-sample capture handoff
files:
  - path: __init__.py
    role: Stable presenter package export surface
    exports:
      - _adaptive_timing_view
      - _build_calendar_integration_record
      - _build_email_integration_record
      - _apply_email_wizard_connection_test_result
      - _build_email_wizard_account_record
      - _build_email_wizard_connection_test_configs
      - _build_email_wizard_connection_test_record
      - _build_email_wizard_guardrail_record
      - _build_email_wizard_profile_record
      - _build_email_wizard_transport_record
      - _build_smart_home_integration_record
      - _build_social_history_learning_record
      - _calendar_integration_sections
      - _capture_voice_profile_sample
      - _connect_sections
      - _default_reminder_due_at
      - _email_integration_context
      - _email_integration_sections
      - _smart_home_integration_sections
      - _format_log_rows
      - _format_usage_rows
      - _health_card_detail
      - build_advanced_hub_page_context
      - build_home_destination_cards
      - build_settings_shortcut_cards
      - _integration_overview_rows
      - _memory_sections
      - _nav_items
      - _provider_status
      - _recent_named_files
      - _reminder_rows
      - _resolve_named_file
      - _settings_sections
      - _social_history_learning_panel
      - _social_history_learning_sections
      - _whatsapp_integration_context
      - build_email_wizard_page_context
      - build_self_coding_ops_page_context
      - build_whatsapp_wizard_page_context
      - _voice_action_result
      - _voice_profile_page_context
      - _voice_snapshot_label
  - path: common.py
    role: Shared reminder, provider-status, and safe file-link helpers
    exports:
      - _default_reminder_due_at
      - _provider_status
      - _recent_named_files
      - _reminder_rows
      - _resolve_named_file
  - path: shell.py
    role: Grouped primary navigation plus flatter Home, Settings shortcut, and Advanced hub card builders
    exports:
      - _nav_items
      - build_advanced_hub_page_context
      - build_home_destination_cards
      - build_settings_shortcut_cards
  - path: connect.py
    role: Provider-routing and credential presenter sections for `/connect`
    exports:
      - _connect_sections
  - path: whatsapp_wizard.py
    role: WhatsApp self-chat wizard page context builder with bounded pairing, live QR rendering, and live status shaping
    exports:
      - build_whatsapp_wizard_page_context
  - path: email_wizard.py
    role: Guided email mailbox setup wizard page context builder, bounded connection-test state shaper, and stepwise record validators
    exports:
      - _apply_email_wizard_connection_test_result
      - _build_email_wizard_account_record
      - _build_email_wizard_connection_test_configs
      - _build_email_wizard_connection_test_record
      - _build_email_wizard_guardrail_record
      - _build_email_wizard_profile_record
      - _build_email_wizard_transport_record
      - build_email_wizard_page_context
  - path: integrations.py
    role: Integration overview rows, compact email/WhatsApp setup summaries, and email/calendar/smart-home form sections including Hue multi-bridge validation
    exports:
      - _build_calendar_integration_record
      - _build_email_integration_record
      - _build_smart_home_integration_record
      - _calendar_integration_sections
      - _email_integration_context
      - _email_integration_sections
      - _integration_overview_rows
      - _smart_home_integration_sections
      - _whatsapp_integration_context
  - path: social_history.py
    role: Social-history learning presenter sections, status panel, and form validation for `/integrations`
    exports:
      - _build_social_history_learning_record
      - _social_history_learning_panel
      - _social_history_learning_sections
  - path: memory.py
    role: Memory, reminders, and print-related settings sections
    exports:
      - _memory_sections
  - path: self_coding.py
    role: Self-coding operator telemetry and learned-skill row builder for `/ops/self-coding`
    exports:
      - build_self_coding_ops_page_context
  - path: ops.py
    role: Redacted ops log, usage, and health detail formatters
    exports:
      - _format_log_rows
      - _format_usage_rows
      - _health_card_detail
  - path: debug.py
    role: Tabbed operator debug page context builder, including the latest persisted live memory-attestation artifact
    exports:
      - build_ops_debug_page_context
      - coerce_ops_debug_tab
  - path: conversation_lab.py
    role: Presenter shaping for the interactive `/ops/debug` Conversation Lab tab
  - path: memory_search.py
    role: Presenter shaping for the read-only `/ops/debug` memory-search tab
  - path: settings.py
    role: Global settings form sections and adaptive timing card builder
    exports:
      - _adaptive_timing_view
      - _settings_sections
  - path: voice.py
    role: Voice-profile page context, action results, and guarded capture helpers
    exports:
      - _capture_voice_profile_sample
      - _voice_action_result
      - _voice_profile_page_context
      - _voice_snapshot_label
