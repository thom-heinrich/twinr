schema_version: 1
name: support
path: src/twinr/web/support
kind: python-package
visibility: internal
summary: Provide shared web support contracts, declared settings-field helpers, and hardened file-backed persistence utilities for Twinr's local control surface.
owned_concerns:
  - Define immutable contract objects shared by web presenters, routes, and templates
  - Build declared form-field definitions for env-backed and managed-store settings and collect fail-closed updates
  - Parse URL-encoded request bodies and atomically read or write `.env` and text-backed settings files
  - Persist the managed web-auth state and verify signed portal sessions without leaking raw passwords
  - Persist generic per-channel onboarding snapshots, including temporary portal QR payloads, and coordinate one bounded pairing job per channel inside the web process
  - Validate WhatsApp wizard inputs, collect bounded runtime probes, and coordinate the bounded WhatsApp pairing flow
  - Expose the curated support import surface consumed across the web package
out_of_scope:
  - FastAPI route handling, redirects, and page composition in `src/twinr/web/app.py`
  - Presenter-specific defaults, normalization, and integration validation in `src/twinr/web/presenters`
  - Template markup, styling, and client-side behavior under `src/twinr/web/templates`
  - Runtime hardware, provider, reminder, or memory orchestration beyond generic file-backed helpers
files:
  - path: __init__.py
    role: Curated support package export surface
    exports:
      - AdaptiveTimingView
      - DashboardCard
      - DetailMetric
      - FileBackedSetting
      - IntegrationOverviewRow
      - SettingsSection
      - mask_secret
      - parse_urlencoded_form
      - read_env_values
      - read_text_file
      - write_env_updates
      - write_text_file
  - path: contracts.py
    role: Immutable contract dataclasses shared by presenters, routes, and templates
    exports:
      - AdaptiveTimingView
      - DashboardCard
      - DetailMetric
      - IntegrationOverviewRow
      - SettingsSection
      - WizardCheckRow
      - WizardStep
  - path: forms.py
    role: Declared settings-field builders and sanitized standard update collection
    exports:
      - _collect_standard_updates
      - _select_field
      - _text_field
      - _textarea_field
  - path: store.py
    role: Hardened request-body parsing and atomic text or `.env` persistence helpers
    exports:
      - FileBackedSetting
      - mask_secret
      - parse_urlencoded_form
      - read_env_values
      - read_text_file
      - write_env_updates
      - write_text_file
  - path: auth.py
    role: File-backed managed web-auth state, password hashing, and signed session helpers
    exports:
      - FileBackedWebAuthStore
      - WebAuthState
      - build_web_auth_session_cookie
      - default_web_auth_username
      - load_authenticated_web_session
      - verify_web_auth_password
      - web_auth_password_min_length
      - web_auth_session_cookie_name
      - web_auth_session_max_age_seconds
  - path: channel_onboarding.py
    role: Generic channel-onboarding snapshot persistence, including QR payload storage, and bounded in-process pairing registry
    exports:
      - ChannelPairingSnapshot
      - FileBackedChannelOnboardingStore
      - InProcessChannelPairingRegistry
  - path: whatsapp.py
    role: WhatsApp wizard validation, QR snapshot shaping, bounded runtime probes, and bounded pairing coordination
    exports:
      - WhatsAppPairingCoordinator
      - WhatsAppRuntimeProbe
      - canonicalize_whatsapp_allow_from
      - normalize_project_relative_directory
      - probe_whatsapp_runtime
public_api:
  module: twinr.web.support
  exports:
    - AdaptiveTimingView
    - DashboardCard
    - DetailMetric
    - FileBackedSetting
    - IntegrationOverviewRow
    - SettingsSection
    - mask_secret
    - parse_urlencoded_form
    - read_env_values
    - read_text_file
    - write_env_updates
    - write_text_file
primary_callers:
  - path: src/twinr/web/app.py
  - path: src/twinr/web/context.py
  - path: src/twinr/web/presenters/connect.py
  - path: src/twinr/web/presenters/memory.py
  - path: src/twinr/web/presenters/settings.py
tests:
  - path: test/test_web_auth.py
  - path: test/test_web_app.py
  - path: test/test_web_store.py
  - path: test/test_simple_settings.py
