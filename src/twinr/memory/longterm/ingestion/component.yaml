schema_version: 1
name: ingestion
path: src/twinr/memory/longterm/ingestion
kind: python-package
visibility: internal
summary: Normalize conversation turns, multimodal evidence, and replayed ops history into candidate long-term memory inputs and sensor-derived summaries.
owned_concerns:
  - Extract an episode plus candidate objects and graph edges from one conversation turn
  - Normalize multimodal evidence from sensor, button, printer, and camera events into candidate memories
  - Normalize structured ReSpeaker audio-policy facts and per-claim metadata into bounded audio routine seeds and observed preference candidates
  - Replay persisted ops history into multimodal evidence for bounded backfill and recovery
  - Compile sensor-derived routines and deviations from previously consolidated pattern objects
  - Compile room-agnostic smart-home day profiles, rolling baselines, grouped acute deviations, quality states, and drift/regime signals from smart-home motion and health pattern history
out_of_scope:
  - Persist or archive long-term memory objects and remote state
  - Resolve conflicts, truth state, retention, or reflection policy
  - Orchestrate runtime queues, workers, or top-level long-term service flows
  - Build retrieval context for prompt assembly or answer generation
files:
  - path: __init__.py
    role: Package marker for long-term ingestion helpers
  - path: extract.py
    role: Conversation-turn extraction orchestration
    exports:
      - LongTermStructuredTurnProgram
      - LongTermTurnExtractor
      - OpenAIStructuredTurnProgram
  - path: propositions.py
    role: Structured proposition schema and compilation
    exports:
      - LongTermStructuredTurnProgram
      - LongTermTurnPropositionBundleV1
      - LongTermTurnPropositionCompiler
      - OpenAIStructuredTurnProgram
      - _turn_proposition_schema
      - structured_turn_program_from_config
  - path: multimodal.py
    role: Multimodal evidence extraction into candidate memories
    exports:
      - LongTermMultimodalExtractor
  - path: environment_profile.py
    role: Room-agnostic smart-home environment-profile compilation
    exports:
      - LongTermEnvironmentProfileCompiler
  - path: environment_stats.py
    role: Shared robust statistics and divergence helpers for environment profiling
  - path: respeaker_audio.py
    role: Structured ReSpeaker audio routine-seed extraction from automation facts
  - path: respeaker_contract.py
    role: ReSpeaker claim-contract parsing and memory-attribute helpers
  - path: sensor_memory.py
    role: Routine and deviation compilation from multimodal patterns
    exports:
      - LongTermSensorMemoryCompiler
  - path: backfill.py
    role: Ops-history replay into multimodal evidence
    exports:
      - LongTermOpsBackfillBuildResult
      - LongTermOpsBackfillRunResult
      - LongTermOpsEventBackfiller
public_api:
  module: twinr.memory.longterm
  exports:
    - LongTermEnvironmentProfileCompiler
    - LongTermMultimodalExtractor
    - LongTermSensorMemoryCompiler
    - LongTermTurnExtractor
    - LongTermTurnPropositionBundleV1
    - LongTermTurnPropositionCompiler
primary_callers:
  - path: src/twinr/memory/longterm/runtime/service.py
  - path: src/twinr/memory/longterm/__init__.py
  - path: src/twinr/memory/__init__.py
tests:
  - path: test/test_longterm_extract.py
  - path: test/test_longterm_propositions.py
  - path: test/test_longterm_multimodal.py
  - path: test/test_sensor_memory.py
  - path: test/test_proactive_monitor.py
  - path: test/test_longterm_memory.py
