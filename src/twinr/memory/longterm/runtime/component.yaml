schema_version: 1
name: runtime
path: src/twinr/memory/longterm/runtime
kind: python-package
visibility: internal
summary: Wire long-term memory stores, reasoning helpers, remote readiness checks, and bounded background writers into one runtime-facing service.
owned_concerns:
  - Assemble the runtime-facing LongTermMemoryService from config and subsystem dependencies
  - Build provider and tool-facing long-term memory context for runtime prompts
  - Materialize live provider answer fronts through remote current-head records so transcript-first runtime turns consume prompt-ready long-term sections without synchronous broad retriever rebuilds
  - Expose the latest built provider/tool context snapshot so operator surfaces can inspect the real turn context without re-running remote recall
  - Build one bounded fast-topic provider context for latency-sensitive answer lanes and preserve precise required-remote read-failure semantics on that hot path
  - Rebuild and persist restart-recall continuity packets after durable-memory mutations so confirmed stable facts survive fresh-reader restarts
  - Centralize bounded query-first object selectors for live-near discovery, reserve, proactive, reflection, sensor-memory, and restart-recall reads
  - Persist conversation turns and multimodal evidence through bounded workers and synchronous fallback paths
  - Route consolidated turns and post-turn tool history into the structured personality-learning service
  - Route explicit RSS/world-intelligence configuration plus reflection-phase feed refresh and recalibration into the structured personality-learning service
  - Enforce true total-deadline flush budgeting across multiple background writers
  - Verify remote-primary snapshot readiness before runtime loops depend on long-term memory state
  - Preserve per-snapshot pointer/origin probe evidence for fail-closed remote readiness
  - Expose runtime entry points for reflection, retention, proactive policy, review, and operator memory mutation
out_of_scope:
  - Define canonical long-term schemas or ontology normalization
  - Implement extraction, consolidation, retrieval, reflection, or retention algorithms themselves
  - Implement low-level object, graph, midterm, or remote-state storage backends
  - Own top-level agent runtime loops, web flows, or hardware orchestration
files:
  - path: __init__.py
    role: Package marker and local summary
  - path: service.py
    role: Compatibility shim that preserves the historic runtime service import surface while delegating the implementation to service_impl/
    exports:
      - LongTermMemoryService
      - LongTermRemoteReadinessResult
      - LongTermRemoteReadinessStep
  - path: live_object_selectors.py
    role: Shared bounded query-first selector layer for live-near reserve/proactive/maintenance object reads
  - path: provider_answer_front.py
    role: Runtime manager for materialized live provider answer fronts backed by remote current-head storage
  - path: context_snapshot.py
    role: Small dataclass that captures the latest built provider/tool long-term context for operator inspection
  - path: service_impl/README.md
    role: Internal map of the refactored service implementation package
  - path: service_impl/main.py
    role: LongTermMemoryService dataclass and inherited runtime method surface
    exports:
      - LongTermMemoryService
  - path: service_impl/compat.py
    role: Shared limits, helper functions, logger, and remote-readiness dataclasses extracted from the old monolith
    exports:
      - LongTermRemoteReadinessResult
      - LongTermRemoteReadinessStep
  - path: service_impl/builder.py
    role: Runtime service assembly and bounded background-writer construction
  - path: service_impl/readiness.py
    role: Required-remote readiness probes and remote-state cache helpers
  - path: service_impl/context.py
    role: Provider-context assembly for normal, live, fast, and tool-facing runtime retrieval
  - path: service_impl/ingestion.py
    role: Conversation/multimodal enqueue paths and dry-run analysis entry points
  - path: service_impl/maintenance.py
    role: Reflection, sensor-memory, ops backfill, and retention orchestration over shared query-first live object slices
  - path: service_impl/proactive.py
    role: Proactive planning, reservation, and delivery/skip state transitions over shared query-first planner selectors
  - path: service_impl/mutations.py
    role: Conflict resolution, review, and prompt-context mutation entry points
  - path: service_impl/lifecycle.py
    role: Flush and shutdown orchestration for bounded background writers plus query-first restart-recall refresh
  - path: service_impl/persistence.py
    role: Static persistence pipeline helpers and multimodal/ops payload sanitization
  - path: worker.py
    role: Bounded background persistence workers
    exports:
      - AsyncLongTermMemoryWriter
      - AsyncLongTermMultimodalWriter
  - path: flush_budget.py
    role: Deterministic total-deadline planner for multi-writer flush orchestration
  - path: health.py
    role: Remote snapshot readiness probe for runtime startup with per-snapshot evidence
    exports:
      - LongTermRemoteWarmCheck
      - LongTermRemoteWarmResult
      - LongTermRemoteHealthProbe
public_api:
  module: twinr.memory.longterm
  exports:
    - LongTermMemoryService
    - AsyncLongTermMemoryWriter
    - AsyncLongTermMultimodalWriter
compatibility_reexports:
  - path: src/twinr/memory/longterm/__init__.py
    names:
      - LongTermMemoryService
      - AsyncLongTermMemoryWriter
      - AsyncLongTermMultimodalWriter
  - path: src/twinr/memory/__init__.py
    names:
      - LongTermMemoryService
      - AsyncLongTermMemoryWriter
      - AsyncLongTermMultimodalWriter
primary_callers:
  - path: src/twinr/agent/base_agent/runtime/base.py
  - path: src/twinr/agent/base_agent/runtime/context.py
  - path: src/twinr/memory/longterm/evaluation/eval.py
  - path: src/twinr/memory/longterm/evaluation/multimodal_eval.py
  - path: src/twinr/memory/__init__.py
tests:
  - path: test/test_longterm_runtime_health.py
  - path: test/test_longterm_worker.py
  - path: test/test_longterm_memory.py
  - path: test/test_longterm_multimodal.py
  - path: test/test_longterm_proactive.py
  - path: test/test_longterm_runtime_query_selectors.py
  - path: test/test_longterm_remote_state.py
