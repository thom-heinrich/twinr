schema_version: 1
name: browser_automation
path: src/twinr/browser_automation
kind: python-package
visibility: internal
summary: Optional browser-automation API boundary plus fail-closed loader for a local gitignored workspace.
owned_concerns:
  - Define the stable browser-automation request, result, artifact, and availability contracts.
  - Define the runtime protocol local browser automation drivers must implement.
  - Resolve and validate the repo-root browser_automation workspace path from Twinr config.
  - Load one local adapter module only when the feature is explicitly enabled and the workspace passes confinement checks.
out_of_scope:
  - Concrete browser automation backends, Playwright orchestration, or agent loops in the repo-root browser_automation workspace
  - Voice-policy, tool-routing, or user-facing confirmation behavior elsewhere in Twinr
files:
  - path: __init__.py
    role: Stable package export surface
    exports:
      - BROWSER_AUTOMATION_FACTORY_NAME
      - BROWSER_AUTOMATION_STATUSES
      - BrowserAutomationArtifact
      - BrowserAutomationAvailability
      - BrowserAutomationDriver
      - BrowserAutomationLoadError
      - BrowserAutomationRequest
      - BrowserAutomationResult
      - BrowserAutomationUnavailableError
      - DEFAULT_BROWSER_AUTOMATION_ENTRY_MODULE
      - DEFAULT_BROWSER_AUTOMATION_WORKSPACE
      - load_browser_automation_driver
      - probe_browser_automation
      - resolve_browser_automation_entry_path
      - resolve_browser_automation_workspace
  - path: contracts.py
    role: Versioned request/result/availability contracts plus driver protocol
  - path: loader.py
    role: Safe local-workspace resolver and dynamic adapter loader
primary_callers:
  - path: src/twinr/agent
  - path: test/test_browser_automation.py
tests:
  - path: test/test_browser_automation.py
  - path: test/test_config.py
