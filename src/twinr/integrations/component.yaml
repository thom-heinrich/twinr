schema_version: 1
name: integrations
path: src/twinr/integrations
kind: python-package
visibility: internal
summary: Provide shared integration contracts, builtin manifests, runtime wiring, and dashboard-facing integration helpers.
owned_concerns:
  - Define the canonical manifest, request, result, and safety models shared by all Twinr integrations
  - Publish Twinr's builtin integration catalog and manifest lookup helpers
  - Evaluate integration policy decisions and dispatch requests to registered adapters
  - Build managed email, calendar, and smart-home adapters from store and environment state
  - Resolve per-bridge Hue application keys and aggregate multiple configured bridges when smart-home routing needs them
  - Expose generic smart-home contracts and provider packages under src/twinr/integrations/smarthome
  - Persist integration configuration and expose integration automation family blocks to the web layer
  - Normalize bounded social-history learning consent and import-state records shared by the portal and runtime queue workers
out_of_scope:
  - Provider-specific email transport, normalization, and adapter behavior in src/twinr/integrations/email
  - Provider-specific calendar event parsing and agenda behavior in src/twinr/integrations/calendar
  - Web routes, form handling, or templates outside the integration-family provider surface in src/twinr/web
  - Agent orchestration or capability policy outside the integration package boundary
files:
  - path: __init__.py
    role: Stable package export surface for shared integration APIs
  - path: adapter.py
    role: Minimal adapter protocol and callable wrapper
    exports:
      - CallableIntegrationAdapter
      - IntegrationAdapter
  - path: models.py
    role: Canonical manifests, requests, results, and safety value objects
    exports:
      - ConfirmationMode
      - DataSensitivity
      - IntegrationAction
      - IntegrationDecision
      - IntegrationDomain
      - IntegrationManifest
      - IntegrationOperation
      - IntegrationRequest
      - IntegrationResult
      - RequestOrigin
      - RiskLevel
      - SafetyProfile
      - SecretReference
      - SecretStorage
  - path: catalog.py
    role: Builtin integration manifest registry and lookup helpers
    exports:
      - BUILTIN_MANIFESTS
      - builtin_manifests
      - manifest_for_id
      - manifests_for_domain
  - path: policy.py
    role: Safety gating and confirmation policy for integration requests
    exports:
      - SafeIntegrationPolicy
      - stricter_confirmation
  - path: registry.py
    role: Adapter registration, policy enforcement, and sync dispatch
    exports:
      - IntegrationNotFoundError
      - IntegrationPolicyError
      - IntegrationRegistry
      - IntegrationRegistryError
  - path: runtime.py
    role: Managed email, calendar, and smart-home runtime assembly from config and environment
    exports:
      - CALENDAR_AGENDA_INTEGRATION_ID
      - EMAIL_APP_PASSWORD_ENV_KEY
      - HUE_ADDITIONAL_BRIDGE_HOSTS_SETTING_KEY
      - EMAIL_MAILBOX_INTEGRATION_ID
      - HUE_APPLICATION_KEY_ENV_KEY
      - IntegrationReadiness
      - ManagedIntegrationsRuntime
      - SMART_HOME_HUB_INTEGRATION_ID
      - build_calendar_agenda_adapter
      - build_email_mailbox_adapter
      - build_managed_integrations
      - build_smart_home_hub_adapter
      - hue_application_key_env_key_for_host
      - validate_calendar_source
  - path: store.py
    role: File-backed integration configuration store with bounded atomic writes
    exports:
      - ManagedIntegrationConfig
      - TwinrIntegrationStore
      - integration_store_path
  - path: social_history.py
    role: Canonical social-history learning consent and import-state normalization shared by the portal and runtime
    exports:
      - SOCIAL_HISTORY_ALLOWED_SOURCES
      - SOCIAL_HISTORY_LEARNING_INTEGRATION_ID
      - SOCIAL_HISTORY_LOOKBACK_OPTIONS
      - SOCIAL_HISTORY_SOURCE_WHATSAPP
      - SocialHistoryLearningConfig
      - social_history_record_with_import_state
  - path: web_automation_families.py
    role: Dashboard automation-family provider blocks for managed integrations
    exports:
      - IntegrationAutomationFamilyBlock
      - IntegrationAutomationFamilyProvider
      - integration_automation_family_providers
  - path: calendar
    role: Read-only calendar provider package
  - path: email
    role: Email provider package
  - path: smarthome
    role: Vendor-neutral smart-home contracts and provider packages
